        { id: "efax-3", name: "secondary", email: "secondary@company.com" },
        { id: "efax-4", name: "marketing", email: "marketing@company.com" },
      ];

      // Seed entries for the Fax Numbers tab. Each entry represents
      // a fax DID with an associated device (the physical fax line),
      // an optional eFax account, and per-device settings shown in
      // the eFax Device modal.
      const faxNumberSeed = [
        { id: "fax-1", number: "(203) 616-4512", device: "GS Test Fax Line 1 [2480]",         efaxId: "efax-1", sendEfaxOnly: "no", faxRetryWait: "30", faxRetryAttempts: "3" },
        { id: "fax-2", number: "(203) 616-4513", device: "Chris SPF Line 1 (No User) [2427]", efaxId: null,     sendEfaxOnly: "no", faxRetryWait: "30", faxRetryAttempts: "3" },
        { id: "fax-3", number: "(203) 616-4629", device: "Chris SPF Line 1 (No User) [2439]", efaxId: null,     sendEfaxOnly: "no", faxRetryWait: "30", faxRetryAttempts: "3" },
        { id: "fax-4", number: "(203) 616-9632", device: "",                                  efaxId: null,     sendEfaxOnly: "no", faxRetryWait: "30", faxRetryAttempts: "3" },
        { id: "fax-5", number: "(203) 616-7819", device: "",                                  efaxId: null,     sendEfaxOnly: "no", faxRetryWait: "30", faxRetryAttempts: "3" },
      ];

      // Portal-based 3-dot menu shown beside the eFax Account dropdown.
      // Adopts the same look as other row-level kebab menus in the prototype
      // and offers Add Account / Edit Account / Delete Account.
      const EFaxKebabMenu = ({ entry, onAdd, onEdit, onDelete }) => {
        const [open, setOpen] = useState(false);
        const [pos, setPos] = useState({ top: 0, left: 0 });
        const btnRef = useRef(null);
        const menuRef = useRef(null);
        const update = () => {
          if (!btnRef.current) return;
          const r = btnRef.current.getBoundingClientRect();
          setPos({ top: r.bottom + 4, left: r.right - 180 });
        };
        useEffect(() => {
          if (!open) return;
          update();
          const onDoc = (e) => {
            if (btnRef.current && btnRef.current.contains(e.target)) return;
            if (menuRef.current && menuRef.current.contains(e.target)) return;
            setOpen(false);
          };
          const onScroll = () => update();
          document.addEventListener("mousedown", onDoc);
          window.addEventListener("scroll", onScroll, true);
          window.addEventListener("resize", onScroll);
          return () => {
            document.removeEventListener("mousedown", onDoc);
            window.removeEventListener("scroll", onScroll, true);
            window.removeEventListener("resize", onScroll);
          };
        }, [open]);
        const hasAccount = !!entry.efaxId;
        const items = [
          { key: "add",    icon: "plus",  label: "Add Account",    enabled: true,        onClick: onAdd },
          { key: "edit",   icon: "edit",  label: "Edit Account",   enabled: hasAccount,  onClick: onEdit },
          { key: "delete", icon: "trash", label: "Delete Account", enabled: hasAccount,  onClick: onDelete },
        ];
        return (
          <>
            <button
              ref={btnRef}
              type="button"
              onClick={() => setOpen((x) => !x)}
              aria-label="More options"
              className={`inline-flex items-center justify-center w-[26px] h-[26px] rounded text-ink-700 hover:bg-ink-50 hover:text-primary-500 transition-colors bvp-focus ${open ? "bg-ink-50 text-primary-500" : ""}`}
            >
              <Icon name="more-vert" size={20} />
            </button>
            {open && ReactDOM.createPortal(
              <div
                ref={menuRef}
                className="fixed z-[9999] bg-white rounded shadow-dropdown py-1 bvp-animate-in"
                style={{ top: pos.top, left: pos.left, width: 180 }}
              >
                {items.map((it) => (
                  <div
                    key={it.key}
                    onClick={() => {
                      if (!it.enabled) return;
                      setOpen(false);
                      it.onClick?.();
                    }}
                    className={`px-3 py-2 text-[14px] flex items-center gap-3 ${
                      it.enabled
                        ? "text-ink-900 cursor-pointer bvp-row-hover"
                        : "text-ink-400 cursor-not-allowed"
                    }`}
                  >
                    <Icon name={it.icon} size={16} />
                    <span>{it.label}</span>
                  </div>
                ))}
              </div>,
              document.body
            )}
          </>
        );
      };

      // Modal that opens from the gear icon next to the Device dropdown.
      // Lets the user configure per-device fax retry behavior.
      const EFaxDeviceModal = ({ open, entry, onClose, onSave }) => {
        const [form, setForm] = useState({ sendEfaxOnly: "no", faxRetryWait: "30", faxRetryAttempts: "3" });
        const [unsavedOpen, setUnsavedOpen] = useState(false);
        const initial = useMemo(() => ({
          sendEfaxOnly:    entry?.sendEfaxOnly ?? "no",
          faxRetryWait:    entry?.faxRetryWait ?? "30",
          faxRetryAttempts: entry?.faxRetryAttempts ?? "3",
        }), [entry]);
        useEffect(() => { if (open) setForm(initial); }, [open, initial]);
        const dirty = open && (
          form.sendEfaxOnly !== initial.sendEfaxOnly ||
          form.faxRetryWait !== initial.faxRetryWait ||
          form.faxRetryAttempts !== initial.faxRetryAttempts
        );
        const requestClose = () => { if (dirty) setUnsavedOpen(true); else onClose?.(); };
        const handleSave = () => { if (!dirty) return; onSave?.({ ...entry, ...form }); onClose?.(); };
        // When "Send eFax only" is Yes, the retry fields are not meaningful
        // because no fax retry will ever happen.
        const retryDisabled = form.sendEfaxOnly === "yes";
        return (
          <>
            <Modal
              open={open}
              onClose={requestClose}
              title="eFax Device"
              width={360}
              footer={
                <>
                  <Button variant="secondary" onClick={requestClose}>Cancel</Button>
                  <Button variant="primary" onClick={handleSave} disabled={!dirty}>Save</Button>
                </>
              }
            >
              <div className="pt-2 pb-4 flex flex-col gap-5">
                <p className="text-[14px] leading-5 text-ink-900">
                  <span className="font-bold">Device: </span>
                  <span>{entry?.device || "—"}</span>
                </p>
                <Select
                  label="Send eFax only"
                  value={form.sendEfaxOnly}
                  onChange={(v) => setForm((f) => ({ ...f, sendEfaxOnly: v }))}
                  options={sendEfaxOnlyOptions}
                />
                <Select
                  label="Fax retry wait time"
                  value={form.faxRetryWait}
                  onChange={(v) => setForm((f) => ({ ...f, faxRetryWait: v }))}
                  options={faxRetryWaitOptions}
                  disabled={retryDisabled}
                />
                <Select
                  label="Fax retry attempts"
                  value={form.faxRetryAttempts}
                  onChange={(v) => setForm((f) => ({ ...f, faxRetryAttempts: v }))}
                  options={faxRetryAttemptsOptions}
                  disabled={retryDisabled}
                />
              </div>
            </Modal>
            <UnsavedChangesDialog
              open={unsavedOpen}
              canSave={dirty}
              onCancel={() => setUnsavedOpen(false)}
              onDiscard={() => { setUnsavedOpen(false); onClose?.(); }}
              onSaveExit={() => { setUnsavedOpen(false); handleSave(); }}
            />
          </>
        );
      };

      // Modal used for both "Add Account" and "Edit Account" flows on the
      // eFax Account dropdown. In edit mode it shows the current account
      // name in the body header; in add mode that header is omitted.
      const EFaxAccountModal = ({ open, mode, account, onClose, onSave }) => {
        const [form, setForm] = useState({ name: "", email: "" });
        const [unsavedOpen, setUnsavedOpen] = useState(false);
        const initial = useMemo(() => ({
          name:  mode === "edit" ? (account?.name  ?? "") : "",
          email: mode === "edit" ? (account?.email ?? "") : "",
        }), [open, mode, account]);
        useEffect(() => { if (open) setForm(initial); }, [open, initial]);
        const dirty = open && (form.name !== initial.name || form.email !== initial.email);
        const canSave = form.name.trim().length > 0 && dirty;
        const requestClose = () => { if (dirty) setUnsavedOpen(true); else onClose?.(); };
        const handleSave = () => {
          if (!canSave) return;
          onSave?.({ ...(account || {}), name: form.name.trim(), email: form.email.trim() });
          onClose?.();
        };
        return (
          <>
            <Modal
              open={open}
              onClose={requestClose}
              title="eFax Account"
              width={400}
              footer={
                <>
                  <Button variant="secondary" onClick={requestClose}>Cancel</Button>
                  <Button variant="primary" onClick={handleSave} disabled={!canSave}>Save</Button>
                </>
              }
            >
              <div className="pt-2 pb-4 flex flex-col gap-5">
                {mode === "edit" && account && (
                  <p className="text-[14px] leading-5 text-ink-900">
                    <span className="font-bold">eFax Account: </span>
                    <span>{account.name}</span>
                  </p>
                )}
                <Input
                  label="eFax Account Name"
                  value={form.name}
                  onChange={(v) => setForm((f) => ({ ...f, name: v }))}
                  required
                />
                <Input
                  label="eFax Account Email"
                  value={form.email}
                  onChange={(v) => setForm((f) => ({ ...f, email: v }))}
                  placeholder="name@company.com"
                />
              </div>
            </Modal>
            <UnsavedChangesDialog
              open={unsavedOpen}
              canSave={canSave}
              onCancel={() => setUnsavedOpen(false)}
              onDiscard={() => { setUnsavedOpen(false); onClose?.(); }}
              onSaveExit={() => { setUnsavedOpen(false); handleSave(); }}
            />
          </>
        );
      };

      const FaxNumberEntry = ({ entry, accountOptions, onChange, onOpenDevice, onAddAccount, onEditAccount, onDeleteAccount }) => (
        <div className="flex flex-col gap-3 items-start shrink-0">
          <p className="text-[14px] leading-5 text-ink-900">
            <span className="font-semibold">Number</span>
            <span>: {entry.number} [fax]</span>
          </p>
          {/* Device row */}
          <div className="flex items-center gap-3">
            <div className="flex items-center gap-6 w-[400px]">
              <div className="text-[14px] leading-5 font-semibold text-ink-900 shrink-0">Device</div>
              <div className="flex-1 min-w-0">
                <Select
                  value={entry.device}
                  onChange={(v) => onChange({ ...entry, device: v })}
                  options={faxDeviceOptions}
                  placeholder="Select"
                />
              </div>
            </div>
            {entry.device ? (
              <IconButton name="settings" size={20} title="Device settings" onClick={() => onOpenDevice(entry)} />
            ) : (
              <PortalTooltip text="Select device">
                <IconButton name="settings" size={20} disabled />
              </PortalTooltip>
            )}
          </div>
          {/* eFax Account row */}
          <div className="flex items-center gap-3">
            <div className="flex items-center gap-6 w-[400px]">
              <div className="text-[14px] leading-5 font-semibold text-ink-900 shrink-0">eFax Account</div>
              <div className="flex-1 min-w-0">
                <Select
                  value={entry.efaxId || ""}
                  onChange={(v) => onChange({ ...entry, efaxId: v || null })}
                  options={accountOptions}
                  placeholder="None"
                />
              </div>
            </div>
            <EFaxKebabMenu
              entry={entry}
              onAdd={() => onAddAccount(entry)}
              onEdit={() => onEditAccount(entry)}
              onDelete={() => onDeleteAccount(entry)}
            />
          </div>
        </div>
      );

      const FaxNumbersTab = ({
        entries, setEntries, accounts, setAccounts,
        setDeleteConfirm, closeDeleteConfirm, showToast,
      }) => {
        const [deviceModal,  setDeviceModal]  = useState({ open: false, entry: null });
        const [accountModal, setAccountModal] = useState({ open: false, mode: "add", account: null, entryId: null });

        const accountsById = useMemo(() => {
          const map = {};
          accounts.forEach((a) => { map[a.id] = a; });
          return map;
        }, [accounts]);
        const accountOptions = useMemo(
          () => accounts.map((a) => ({ value: a.id, label: a.name })),
          [accounts]
        );

        const updateEntry = (next) =>
          setEntries((es) => es.map((e) => (e.id === next.id ? next : e)));

        const openDevice = (entry) => setDeviceModal({ open: true, entry });
        const closeDevice = () => setDeviceModal({ open: false, entry: null });
        const saveDevice = (next) => updateEntry(next);

        const openAddAccount = (entry) =>
          setAccountModal({ open: true, mode: "add", account: null, entryId: entry.id });
        const openEditAccount = (entry) => {
          const acc = accountsById[entry.efaxId];
          if (!acc) return;
          setAccountModal({ open: true, mode: "edit", account: acc, entryId: entry.id });
        };
        const closeAccountModal = () =>
          setAccountModal({ open: false, mode: "add", account: null, entryId: null });

        const saveAccount = (acc) => {
          if (accountModal.mode === "add") {
            const newId = `efax-${Date.now()}`;
            const newAcc = { ...acc, id: newId };
            setAccounts((as) => [...as, newAcc]);
            // Auto-assign the new account to the row that opened the modal.
            if (accountModal.entryId) {
              setEntries((es) => es.map((e) => (e.id === accountModal.entryId ? { ...e, efaxId: newId } : e)));
            }
            showToast?.(`Created eFax account "${newAcc.name}"`);
          } else {
            setAccounts((as) => as.map((a) => (a.id === acc.id ? { ...a, ...acc } : a)));
            showToast?.(`Updated eFax account "${acc.name}"`);
          }
        };

        const deleteAccount = (entry) => {
          const acc = accountsById[entry.efaxId];
          if (!acc) return;
          setDeleteConfirm({
            open: true,
            title: "Delete eFax Account",
            itemName: acc.name,
            onConfirm: () => {
              setAccounts((as) => as.filter((a) => a.id !== acc.id));
              setEntries((es) => es.map((e) => (e.efaxId === acc.id ? { ...e, efaxId: null } : e)));
              showToast?.(`Deleted eFax account "${acc.name}"`);
              closeDeleteConfirm();
            },
          });
        };

        // Pair entries into rows of two columns to mirror the Figma layout.
        const rows = [];
        for (let i = 0; i < entries.length; i += 2) rows.push(entries.slice(i, i + 2));

        return (
          <div className="pt-6 flex flex-col gap-[48px]">
            {entries.length === 0 ? (
              <div className="py-12 text-center text-[14px] text-ink-500">
                There are no fax numbers yet
              </div>
            ) : (
              rows.map((row, ri) => (
                <div key={ri} className="flex gap-[120px] items-start">
                  {row.map((entry) => (
                    <FaxNumberEntry
                      key={entry.id}
                      entry={entry}
                      accountOptions={accountOptions}
                      onChange={updateEntry}
                      onOpenDevice={openDevice}
                      onAddAccount={openAddAccount}
                      onEditAccount={openEditAccount}
                      onDeleteAccount={deleteAccount}
                    />
                  ))}
                </div>
              ))
            )}
            <EFaxDeviceModal
              open={deviceModal.open}
              entry={deviceModal.entry}
              onClose={closeDevice}
              onSave={saveDevice}
            />
            <EFaxAccountModal
              open={accountModal.open}
              mode={accountModal.mode}
              account={accountModal.account}
              onClose={closeAccountModal}
              onSave={saveAccount}
            />
          </div>
        );
      };

      /* =====================================================
       *  AWAY MODE RULE MODAL
       * ===================================================== */

      // Small numeric stepper used for hours / minutes.
      const NumberStepper = ({ value, onChange, min = 0, max = 99, step = 1, width = 112 }) => {
        const clamp = (n) => Math.max(min, Math.min(max, n));
        return (
          <div className="relative h-8 flex items-center border border-ink-200 rounded bg-white" style={{ width }}>
            <input
              type="text"
              value={String(value)}
              onChange={(e) => {
                const v = e.target.value;
                if (v === "") { onChange(""); return; }
                const n = parseInt(v, 10);
                if (!Number.isNaN(n)) onChange(clamp(n));
              }}
              onBlur={() => {
                if (value === "" || value == null) onChange(min);
                else onChange(clamp(parseInt(value, 10) || min));
              }}
              className="w-full h-full pl-3 pr-6 text-[14px] leading-5 text-ink-900 bg-transparent focus:outline-none"
            />
            <div className="absolute right-1 top-1/2 -translate-y-1/2 flex flex-col">
              <button type="button" onClick={() => onChange(clamp((Number(value) || 0) + step))}
                className="h-3 w-4 inline-flex items-center justify-center text-ink-600 hover:text-primary-500">
                <svg width="8" height="5" viewBox="0 0 8 5" fill="none"><path d="M4 0L0 4L1 5L4 2L7 5L8 4L4 0Z" fill="currentColor"/></svg>
              </button>
              <button type="button" onClick={() => onChange(clamp((Number(value) || 0) - step))}
                className="h-3 w-4 inline-flex items-center justify-center text-ink-600 hover:text-primary-500">
                <svg width="8" height="5" viewBox="0 0 8 5" fill="none"><path d="M4 5L0 1L1 0L4 3L7 0L8 1L4 5Z" fill="currentColor"/></svg>
              </button>
            </div>
          </div>
        );
      };

      const AwayModeRuleModal = ({ open, onClose, editing, schedulers, awayRules = [], onSave }) => {
        const [name, setName] = useState("");
        const [destination, setDestination] = useState("");
        const [expiresHours, setExpiresHours] = useState(24);
        const [expiresMinutes, setExpiresMinutes] = useState(0);
        // assignedSchedulers is an array of scheduler IDs (or empty strings for new rows)
        const [assignedSchedulers, setAssignedSchedulers] = useState([""]);
        const [confirmOpen, setConfirmOpen] = useState(false);
        // Snapshot of the values at the moment the modal opened — used to
        // disable "Save" until the user actually changes something.
        const initialRef = useRef(null);

        useEffect(() => {
          if (!open) return;
          const init = editing
            ? {
                name: editing.name || "",
                destination: editing.destValue || "",
                expiresHours: editing.expiresHours ?? 24,
                expiresMinutes: editing.expiresMinutes ?? 0,
                schedulerIds: editing.schedulerIds && editing.schedulerIds.length ? [...editing.schedulerIds] : [""],
              }
            : { name: "", destination: "", expiresHours: 24, expiresMinutes: 0, schedulerIds: [""] };
          initialRef.current = init;
          setName(init.name);
          setDestination(init.destination);
          setExpiresHours(init.expiresHours);
          setExpiresMinutes(init.expiresMinutes);
          setAssignedSchedulers(init.schedulerIds);
          setConfirmOpen(false);
        }, [open, editing]);

        if (!open) return null;

        const destinationOptionsForModal = destinationOptions;

        const schedulerOptions = schedulers.map((s) => ({
          value: s.id,
          label: s.name,
        }));

        // Don't allow the same scheduler to be selected twice — filter options per row
        const optionsForRow = (idx) => {
          const takenElsewhere = new Set(assignedSchedulers.filter((_, i) => i !== idx));
          return schedulerOptions.filter((o) => !takenElsewhere.has(o.value));
        };

        const addScheduler = () => setAssignedSchedulers((xs) => [...xs, ""]);
        const removeScheduler = (idx) => setAssignedSchedulers((xs) => xs.length === 1 ? [""] : xs.filter((_, i) => i !== idx));
        const updateScheduler = (idx, val) => setAssignedSchedulers((xs) => xs.map((x, i) => (i === idx ? val : x)));

        // Validation: name required, destination required,
        // expires must be > 10 minutes total and <= 24 hours.
        const totalMinutes = (Number(expiresHours) || 0) * 60 + (Number(expiresMinutes) || 0);
        const timeOk = totalMinutes >= 10 && totalMinutes <= 24 * 60;
        const validOk = Boolean(name.trim() && destination && timeOk);
        // Dirty check: compare current state vs. snapshot taken on open.
        const currentSnap = { name, destination, expiresHours, expiresMinutes, schedulerIds: assignedSchedulers };
        const dirty = initialRef.current ? JSON.stringify(currentSnap) !== JSON.stringify(initialRef.current) : false;
        const canSave = validOk && dirty;

        const handleSave = () => {
          if (!canSave) return;
          const destLabel = destinationOptions.find((o) => o.value === destination)?.label ?? "";
          const pickedIds = assignedSchedulers.filter(Boolean);
          onSave({
            id: editing?.id,
            name: name.trim(),
            destination: destLabel,
            destValue: destination,
            toggleDestination: editing?.toggleDestination || `Toggle-${Math.floor(Math.random() * 9000 + 1000)} [${Math.floor(Math.random() * 9000 + 1000)}]`,
            expiresHours: Number(expiresHours) || 0,
            expiresMinutes: Number(expiresMinutes) || 0,
            schedulerIds: pickedIds,
          });
        };

        // Wraps onClose to prompt before discarding unsaved changes.
        const requestClose = () => {
          if (!dirty) { onClose?.(); return; }
          setConfirmOpen(true);
        };

        return (
          <>
          <Modal
            open={open}
            onClose={requestClose}
            title="Away Mode Rule"
            width={524}
            outerHeight={500}
            footer={
              <>
                <Button variant="secondary" onClick={requestClose}>Cancel</Button>
                <Button variant="primary" onClick={handleSave} disabled={!canSave}>Save</Button>
              </>
            }
          >
            <div className="flex flex-col gap-5 py-4">
              <div className="grid grid-cols-2 gap-4">
                <Input label="Rule name" required value={name} onChange={setName} placeholder="e.g. Reception Desk" />
                <Select
                  label="Destination"
                  required
                  value={destination}
                  onChange={setDestination}
                  options={destinationOptionsForModal}
                  placeholder="Select destination…"
                />
              </div>

              {/* Expires in row */}
              <div className="flex items-center gap-3">
                <div className="flex items-center gap-1 shrink-0">
                  <span className="text-[14px] font-semibold leading-5 tracking-[0.018em] text-ink-700">Expires in</span>
                  <PortalTooltip text={`Call routing returns to the scheduler’s rules after the selected time or when Away Mode is turned off manually.`} className="group">
                    <Icon name="info-circle" size={16} className="text-ink-500 cursor-help group-hover:text-[#244C91] transition-colors" />
                  </PortalTooltip>
                </div>
                <div className="flex items-center gap-2">
                  <NumberStepper value={expiresHours} onChange={setExpiresHours} min={0} max={24} width={96} />
                  <span className="text-[14px] text-ink-700">Hours</span>
                </div>
                <div className="flex items-center gap-2">
                  <NumberStepper value={expiresMinutes} onChange={setExpiresMinutes} min={0} max={59} step={5} width={96} />
                  <span className="text-[14px] text-ink-700">Minutes</span>
                </div>
              </div>
              {!timeOk && (name || destination) && (
                <div className="text-[12px] text-danger-500 -mt-3">
                  {totalMinutes < 10
                    ? "Expiration must be at least 10 minutes."
                    : "Expiration cannot exceed 24 hours."}
                </div>
              )}

              <hr className="border-ink-100" />

              {/* Assigned schedulers */}
              <div className="flex flex-col gap-3">
                <div className="text-[14px] font-semibold text-ink-700">Assigned schedulers</div>
                <div className="flex flex-col gap-2">
                  {assignedSchedulers.map((val, idx) => (
                    <div key={idx} className="flex items-center gap-2">
                      <span className="text-[14px] font-semibold text-ink-700 w-5 text-right">{idx + 1}.</span>
                      <div className="flex-1">
                        <Select
                          value={val}
                          onChange={(v) => updateScheduler(idx, v)}
                          options={optionsForRow(idx)}
                          placeholder="Select a scheduler"
                        />
                      </div>
                      <button
                        type="button"
                        onClick={() => removeScheduler(idx)}
                        className="w-[26px] h-[26px] inline-flex items-center justify-center rounded text-ink-700 hover:bg-ink-50 hover:text-primary-500"
                        aria-label="Remove scheduler"
                      >
                        <Icon name="trash" size={18} />
                      </button>
                    </div>
                  ))}
                </div>
                <div>
                  <button
                    type="button"
                    onClick={addScheduler}
                    disabled={assignedSchedulers.length >= schedulers.length}
                    className="inline-flex items-center gap-1 h-6 pl-1 pr-2 rounded bg-white border border-[#A3B6D7] text-[#244C91] text-[12px] font-bold uppercase tracking-btnSm hover:bg-[#D1DAEB] transition-colors disabled:bg-[#E5E6E8] disabled:border-[#E5E6E8] disabled:text-[#4C5863] disabled:cursor-not-allowed"
                  >
                    <Icon name="plus" size={14} />
                    Scheduler
                  </button>
                </div>
              </div>
            </div>
          </Modal>
          <UnsavedChangesDialog
            open={confirmOpen}
            canSave={!!canSave}

                <div className="flex items-center gap-1">
                  <IconButton name="edit"  title="Edit scheduler" onClick={onEdit} />
                  <IconButton name="copy"  title="Duplicate scheduler" onClick={onDuplicate} />
                  {scheduler.isDefault ? (
                    <PortalTooltip text="The default scheduler cannot be deleted">
                      <IconButton name="trash" title="Delete scheduler" disabled />
                    </PortalTooltip>
                  ) : (
                    <IconButton name="trash" title="Delete scheduler" onClick={onDelete} />
                  )}
                </div>
              </div>
            </div>

            <div className="mx-6 border-t border-ink-100" />

            {/* Time slots section */}
            <div className="px-6 pt-4 pb-3">
              <button onClick={() => onExpandSection(tsKey)} className="flex items-center gap-2 text-[14px] font-semibold text-ink-900 mb-2">
                <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-ink-50">
                  <Icon name={tsExpanded ? "chevron-up" : "chevron-down"} size={16} className="text-ink-700" />
                </span>
                <span className="font-semibold">Time slots{!tsExpanded && <span className="font-semibold text-[#7F888F]"> [{scheduler.timeSlots.length}]</span>}</span>
              </button>
              {tsExpanded && (
                scheduler.timeSlots.length === 0 ? (
                  <div className="text-[14px] text-ink-500 pl-8">No time slots found</div>
                ) : (
                  <div className="flex flex-col gap-2">
                    {scheduler.timeSlots.map((ts) => (
                      <div key={ts.id} className="grid grid-cols-[260px_280px_40px_1fr] items-center h-9 px-3 rounded-lg bg-ink-50">
                        <div className="flex items-center gap-2 text-[14px] min-w-0 pr-2">
                          <Icon name="clock" size={16} className="text-ink-600 shrink-0" />
                          <TruncationTooltip text={ts.days} className="flex-1" innerClassName="font-semibold" />
                        </div>
                        <div className="text-[14px] text-ink-700">{ts.range}</div>
                        <Icon name="arrow-right" size={16} className="text-ink-500" />
                        <div className="text-[14px] text-ink-700 font-semibold">{ts.dest}</div>
                      </div>
                    ))}
                  </div>
                )
              )}
            </div>

            {/* Holidays section */}
            <div className="px-6 py-4">
              <button onClick={() => onExpandSection(hKey)} className="flex items-center gap-2 text-[14px] font-semibold text-ink-900 mb-2">
                <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-ink-50">
                  <Icon name={hExpanded ? "chevron-up" : "chevron-down"} size={16} className="text-ink-700" />
                </span>
                <span className="font-semibold">Holidays{!hExpanded && <span className="font-semibold text-[#7F888F]"> [{holidays.length}]</span>}</span>
              </button>
              {hExpanded && (
                holidays.length === 0 ? (
                  <div className="text-[14px] text-ink-500 pl-8">No holidays found</div>
                ) : (
                  <div className="flex flex-col gap-2">
                    {holidays.map((h, idx) => {
                      // Highlight the row for any attached ongoing (location) holiday.
                      const isOngoing = h.source === "location" && !!h.ongoing;
                      const rowBg = isOngoing ? "bg-[#F8EAF4]" : "bg-ink-50";
                      const hasMultiDates = Array.isArray(h.dates) && h.dates.length > 1;
                      const hasMultiSlots = Array.isArray(h.slots) && h.slots.length > 1;
                      const wherePieces = (h.when || "").split(" • ");
                      const datePart = hasMultiDates ? "Multiple dates" : (wherePieces[0] || "");
                      const timePart = hasMultiSlots ? "Multiple time slots" : (wherePieces[1] || "");
                      const dateTip = hasMultiDates ? h.dates.join(", ") : "";
                      const slotTip = hasMultiSlots ? h.slots.map((s) => `${s.start} - ${s.end}`).join(", ") : "";
                      const fallbackTip = h.tooltip || h.when;
                      return (
                        <div key={h.id || idx} className={`grid grid-cols-[260px_280px_40px_1fr] items-center h-9 px-3 rounded-lg ${rowBg}`}>
                          <div className="flex items-center gap-2 text-[14px] min-w-0 pr-2">
                            <Icon name="calendar" size={14} className="text-ink-600 shrink-0" />
                            <TruncationTooltip text={h.name} className="flex-1" innerClassName="font-semibold" />
                          </div>
                          <div className="text-[14px] text-ink-700 min-w-0 overflow-hidden pr-2">
                            <span className="truncate block">
                              {hasMultiDates ? (
                                <PortalTooltip text={dateTip}>
                                  <span className="cursor-help">{datePart}</span>
                                </PortalTooltip>
                              ) : (
                                datePart
                              )}
                              {timePart && (
                                <>
                                  {" • "}
                                  {hasMultiSlots ? (
                                    <PortalTooltip text={slotTip}>
                                      <span className="cursor-help">{timePart}</span>
                                    </PortalTooltip>
                                  ) : (
                                    timePart
                                  )}
                                </>
                              )}
                            </span>
                          </div>
                          <Icon name="arrow-right" size={16} className="text-ink-500" />
                          <div className="text-[14px] text-ink-700 font-semibold">{h.dest}</div>
                        </div>
                      );
                    })}
                  </div>
                )
              )}
            </div>
          </div>
        );
      };

      /* =====================================================
       *  SCHEDULER EDITOR MODAL (large modal overlay)
       * ===================================================== */

      const SchedulerEditorModal = ({ open, onClose, scheduler, onSave, locationHolidaysCatalog = locationHolidayCatalog, dids = [], schedulersCount = 0, isOnlyDefault = false, awayRules = [] }) => {
        const isExisting = !!(scheduler && scheduler.id);
        const isNewBlank = !scheduler; // opened from "New Scheduler" with no draft

        // Parse a comma-separated DID string into an array.
        const parseDIDs = (s) => (!s ? [] : String(s).split(",").map((x) => x.trim()).filter(Boolean));

        const [tab, setTab] = useState("info");
        // Tabs that have been navigated away from while still containing
        // validation errors. When the user comes back to such a tab the
        // offending fields are highlighted with a red stroke.
        const [revealedErrorTabs, setRevealedErrorTabs] = useState(() => new Set());
        // Controls the "Unsaved Changes" confirmation dialog.
        const [confirmOpen, setConfirmOpen] = useState(false);
        const [name, setName] = useState(isNewBlank ? "" : (scheduler?.name ?? ""));
        const [defaultRoute, setDefaultRoute] = useState(scheduler?.defaultRoute ?? "");
        const [awayRoute, setAwayRoute] = useState(scheduler?.awayRoute ?? "");
        // Empty-list rule: the first scheduler MUST be the default.
        const defaultLocked = (isNewBlank && schedulersCount === 0) || isOnlyDefault;
        const [isDefault, setIsDefault] = useState(defaultLocked ? true : (scheduler?.isDefault ?? false));
        const [assignedDIDs, setAssignedDIDs] = useState(parseDIDs(scheduler?.assignedTo));
        const [didSearch, setDidSearch] = useState("");
        const [didSelection, setDidSelection] = useState({ assigned: [], available: [] });
        const [timeSlots, setTimeSlots] = useState(scheduler?.timeSlots ?? []);
        const [customHolidays, setCustomHolidays] = useState(scheduler?.customHolidays ?? []);
        const [locationHolidays, setLocationHolidays] = useState(scheduler?.locationHolidays ?? []);

        const [customHolidayModal, setCustomHolidayModal] = useState({ open: false, editing: null });
        const [locationHolidayModal, setLocationHolidayModal] = useState(false);

        // Snapshot of the initial state on open, used to detect per-tab dirty state.
        const initialStateRef = useRef(null);

        // Reset when scheduler changes
        useEffect(() => {
          if (open) {
            const blank = !scheduler;
            const initialName = blank ? "" : (scheduler?.name ?? "");
            const initialDefaultRoute = scheduler?.defaultRoute ?? "";
            const initialAwayRoute = scheduler?.awayRoute ?? "";
            // Force default=true when this is the first scheduler being created, or when
            // editing the only remaining default scheduler.
            const initialIsDefault = defaultLocked ? true : (scheduler?.isDefault ?? false);
            const initialAssignedDIDs = parseDIDs(scheduler?.assignedTo);
            // Group any pre-existing matching slots so list + calendar render in lockstep.
            const initialTimeSlots = mergeMatchingTimeSlots(scheduler?.timeSlots ?? []);
            const initialCustomHolidays = scheduler?.customHolidays ?? [];
            const initialLocationHolidays = scheduler?.locationHolidays ?? [];

            initialStateRef.current = {
              info: {
                name: initialName,
                defaultRoute: initialDefaultRoute,
                awayRoute: initialAwayRoute,
                isDefault: initialIsDefault,
                assignedDIDs: initialAssignedDIDs,
              },
              timeslots: initialTimeSlots,
              holidays: {
                customHolidays: initialCustomHolidays,
                locationHolidays: initialLocationHolidays,
              },
            };

            setTab("info");
            setRevealedErrorTabs(new Set());
            setConfirmOpen(false);
            setName(initialName);
            setDefaultRoute(initialDefaultRoute);
            setAwayRoute(initialAwayRoute);
            setIsDefault(initialIsDefault);
            setAssignedDIDs(initialAssignedDIDs);
            setDidSearch("");
            setDidSelection({ assigned: [], available: [] });
            setTimeSlots(initialTimeSlots);
            setCustomHolidays(initialCustomHolidays);
            setLocationHolidays(initialLocationHolidays);
          }
        }, [open, scheduler]);

        // Compute per-tab dirty state vs initial snapshot.
        const tabDirty = useMemo(() => {
          const initial = initialStateRef.current;
          if (!initial) return { info: false, timeslots: false, holidays: false };
          const infoDirty =
            name !== initial.info.name ||
            defaultRoute !== initial.info.defaultRoute ||
            awayRoute !== initial.info.awayRoute ||
            isDefault !== initial.info.isDefault ||
            JSON.stringify(assignedDIDs) !== JSON.stringify(initial.info.assignedDIDs);
          const timeslotsDirty =
            JSON.stringify(timeSlots) !== JSON.stringify(initial.timeslots);
          const holidaysDirty =
            JSON.stringify(customHolidays) !== JSON.stringify(initial.holidays.customHolidays) ||
            JSON.stringify(locationHolidays) !== JSON.stringify(initial.holidays.locationHolidays);
          return { info: infoDirty, timeslots: timeslotsDirty, holidays: holidaysDirty };
        }, [name, defaultRoute, awayRoute, isDefault, assignedDIDs, timeSlots, customHolidays, locationHolidays]);

        const isAnyDirty = tabDirty.info || tabDirty.timeslots || tabDirty.holidays;

        // Per-tab validation errors (unfilled required fields or data errors).
        // Each entry is an array of human-readable error messages so the tab's
        // red error badge can show a tooltip listing exactly what's blocking
        // the user from saving.
        const tabErrors = useMemo(() => {
          const info = [];
          if (!name.trim()) info.push("Scheduler name is required");
          if (!defaultRoute) info.push("Default route is required");

          const timeslots = [];
          (timeSlots || []).forEach((raw, idx) => {
            const ts = (raw && raw.start && raw.end) ? raw : (() => {
              const parts = String(raw?.range || "").split(/\s*-\s*/);
              return { ...raw, start: parts[0] || "", end: parts[1] || "" };
            })();
            const slotLabel = `Slot ${idx + 1}`;
            const hasDays = normalizeDays(ts.days).length > 0;
            const hasDest = !!(ts.dest && String(ts.dest).trim());
            const hasStart = !!(ts.start && String(ts.start).trim());
            const hasEnd = !!(ts.end && String(ts.end).trim());
            if (!hasDays) timeslots.push(`${slotLabel}: select day(s)`);
            if (!hasDest) timeslots.push(`${slotLabel}: select a destination`);
            if (!hasStart) timeslots.push(`${slotLabel}: start time is required`);
            if (!hasEnd) timeslots.push(`${slotLabel}: end time is required`);
            if (hasStart && hasEnd && parseTimeToMinutes(ts.start) >= parseTimeToMinutes(ts.end)) {
              timeslots.push(`${slotLabel}: start time must be before end time`);
            }
          });

          const holidays = [];

          return { info, timeslots, holidays };
        }, [name, defaultRoute, timeSlots]);

        // Switch the active tab; if the tab being left has validation errors,
        // remember that so the next time the user returns to it the offending
        // fields are highlighted in red.
        const switchTab = (newTab) => {
          if (newTab === tab) return;
          if ((tabErrors[tab] || []).length > 0) {
            setRevealedErrorTabs((prev) => {
              if (prev.has(tab)) return prev;
              const n = new Set(prev); n.add(tab); return n;
            });
          }
          setTab(newTab);
        };

        if (!open) return null;

        const onSaveCustomHoliday = (data) => {
          if (data.id) {
            setCustomHolidays((hs) => hs.map((h) => (h.id === data.id ? data : h)));
          } else {
            setCustomHolidays((hs) => [...hs, { ...data, id: `ch-${Date.now()}` }]);
          }
          setCustomHolidayModal({ open: false, editing: null });
        };
        const onDeleteCustomHoliday = (id) => setCustomHolidays((hs) => hs.filter((h) => h.id !== id));
        const onSaveLocationHolidays = (ids) => {
          setLocationHolidays(ids);
          setLocationHolidayModal(false);
        };
        const onDeleteLocationHoliday = (id) => setLocationHolidays((ids) => ids.filter((x) => x !== id));

        const onExitSave = () => onSave({
          name,
          defaultRoute,
          awayRoute,
          isDefault,
          assignedTo: assignedDIDs.join(", "),
          timeSlots,
          customHolidays,
          locationHolidays,
        });

        // Transfer-list helpers — pull from the live DID list so the modal matches the DIDs page.
        // A DID is "assigned elsewhere" when it belongs to any scheduler other than the one being edited.
        const currentSchedulerId = scheduler?.id ?? null;
        const assignedSet = new Set(assignedDIDs);
        const availableDIDs = dids
          .filter((d) => !assignedSet.has(d.number))
          .map((d) => ({
            number: d.number,
            assignedElsewhere: !!d.schedulerId && d.schedulerId !== currentSchedulerId,
          }));
        const filterBySearch = (list) => {
          const q = didSearch.trim().toLowerCase();
          if (!q) return list;
          // Strip brackets/spaces/hyphens so "8054" matches "(805) 413-6703",
          // mirroring the DIDs page behaviour.
          const stripPhone = (s) => (s || "").toLowerCase().replace(/[()\s-]/g, "");
          const qStripped = stripPhone(q);
          return list.filter((x) => {
            const n = (x.number || x || "").toString().toLowerCase();
            return n.includes(q) || (qStripped && stripPhone(n).includes(qStripped));
          });
        };
        const moveToAssigned = () => {
          const picks = didSelection.available;
          if (!picks.length) return;
          setAssignedDIDs((xs) => [...xs, ...picks]);
          setDidSelection((s) => ({ ...s, available: [] }));
        };
        const moveToAvailable = () => {
          const picks = didSelection.assigned;
          if (!picks.length) return;
          setAssignedDIDs((xs) => xs.filter((n) => !picks.includes(n)));
          setDidSelection((s) => ({ ...s, assigned: [] }));
        };
        const togglePick = (side, num) => {
          setDidSelection((s) => ({
            ...s,
            [side]: s[side].includes(num) ? s[side].filter((n) => n !== num) : [...s[side], num],
          }));
        };

        // Wraps onClose to prompt before discarding unsaved changes.
        const requestClose = () => {
          if (!isAnyDirty) { onClose?.(); return; }
          setConfirmOpen(true);
        };
        // Save & Exit is only possible when the normal Save button would be
        // enabled — i.e. required fields are filled and no tab has errors.
        const canSaveExit = Boolean(name.trim() && defaultRoute && isAnyDirty && tabErrors.timeslots.length === 0);

        return (
          <>
            <div className="fixed inset-0 z-40 bg-ink-900/40 flex items-center justify-center p-6" onClick={requestClose}>
              <div
                className="bg-white rounded-lg shadow-dropdown flex flex-col max-h-[92vh] w-[800px] max-w-[95vw] bvp-animate-in"
                onClick={(e) => e.stopPropagation()}
              >
                {/* Header */}
                <div className="flex items-center justify-between h-16 px-6 shrink-0 border-b border-ink-100">
                  <div className="flex items-center gap-3">
                    <h2 className="font-display text-[18px] font-semibold text-ink-900 leading-none">Scheduler</h2>
                    <span className="text-[12px] uppercase tracking-btnSm text-ink-500 font-semibold leading-none">
                      {name && name.trim() ? name : "Scheduler name"}
                    </span>
                  </div>
                  <IconButton name="close" title="Close" onClick={requestClose} />
                </div>

                {/* Inner tabs (fixed) */}
                <div className="px-7 py-6 shrink-0 flex justify-center">
                  <div className="inline-flex items-center h-12 bg-ink-50 rounded-lg p-1.5 gap-[24px]">
                    {[
                      { id: "info",     label: "Scheduler Information" },
                      { id: "timeslots",label: "Time Slots" },
                      { id: "holidays", label: "Holidays" },
                    ].map((t) => {
                      const isActive = tab === t.id;
                      const isDirty = tabDirty[t.id];
                      const errors = tabErrors[t.id] || [];
                      const showErrorBadge = errors.length > 0 && !isActive;
                      const errorIcon = (
                        <svg
                          width="14"
                          height="14"
                          viewBox="0 0 12 12"
                          fill="none"
                          xmlns="http://www.w3.org/2000/svg"
                          className="shrink-0"
                          aria-label="Tab has errors or unfilled required fields"
                        >
                          <path d="M6 0C2.688 0 0 2.688 0 6C0 9.312 2.688 12 6 12C9.312 12 12 9.312 12 6C12 2.688 9.312 0 6 0ZM6 6.6C5.67 6.6 5.4 6.33 5.4 6V3.6C5.4 3.27 5.67 3 6 3C6.33 3 6.6 3.27 6.6 3.6V6C6.6 6.33 6.33 6.6 6 6.6ZM6.6 9H5.4V7.8H6.6V9Z" fill="#C70816"/>
                        </svg>
                      );
                      const errorTooltipText = (
                        <div className="flex flex-col gap-1 text-left">
                          <div className="font-semibold">Fix the following to save:</div>
                          {errors.map((msg, i) => (
                            <div key={i}>• {msg}</div>
                          ))}
                        </div>
                      );
                      return (
                        <button
                          key={t.id}
                          onClick={() => switchTab(t.id)}
                          className={`inline-flex items-center h-9 px-[14px] rounded-lg text-[14px] font-semibold transition-colors ${
                            isActive
                              ? "bg-white border border-ink-100 text-ink-900 shadow-[0_0_12px_0_rgba(0,0,0,0.12)]"
                              : "text-ink-600 hover:text-ink-900"
                          }`}
                        >
                          <span>{t.label}</span>
                          {showErrorBadge ? (
                            <PortalTooltip text={errorTooltipText} className="ml-1.5">
                              {errorIcon}
                            </PortalTooltip>
                          ) : isDirty ? (
                            <span
                              className="inline-block w-3 h-3 rounded-full bg-secondary-500 ml-1.5 shrink-0"
                              aria-label="Unsaved changes"
                            />
                          ) : null}
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Body */}
                <div className="overflow-auto px-7 py-6 bvp-scroll h-[560px]">
                  {tab === "info" && (
                    <SchedulerInfoTab
                      name={name} setName={setName}
                      defaultRoute={defaultRoute} setDefaultRoute={setDefaultRoute}
                      isDefault={isDefault} setIsDefault={setIsDefault}
                      defaultLocked={defaultLocked}
                      assignedDIDs={assignedDIDs}
                      availableDIDs={availableDIDs}
                      didSearch={didSearch} setDidSearch={setDidSearch}
                      didSelection={didSelection}
                      togglePick={togglePick}
                      moveToAssigned={moveToAssigned}
                      moveToAvailable={moveToAvailable}
                      filterBySearch={filterBySearch}
                      showErrors={revealedErrorTabs.has("info")}
                    />
                  )}
                  {tab === "timeslots" && (
                    <TimeSlotsTab
                      timeSlots={timeSlots}
                      setTimeSlots={setTimeSlots}
                      defaultRoute={defaultRoute}
                      hasErrors={tabErrors.timeslots.length > 0}
                      showErrors={revealedErrorTabs.has("timeslots")}
                    />
                  )}
                  {tab === "holidays" && (
                    <HolidaysTab
                      customHolidays={customHolidays}
                      locationHolidays={locationHolidays}
                      locationHolidaysCatalog={locationHolidaysCatalog}
                      onAddCustom={() => setCustomHolidayModal({ open: true, editing: null })}
                      onEditCustom={(h) => setCustomHolidayModal({ open: true, editing: h })}
                      onDeleteCustom={onDeleteCustomHoliday}
                      onAddLocation={() => setLocationHolidayModal(true)}
                      onDeleteLocation={onDeleteLocationHoliday}
                    />
                  )}
                </div>

                {/* Footer */}
                <div className="flex items-center justify-end gap-3 h-[68px] px-6 border-t border-ink-100 shrink-0">
                  <Button variant="secondary" onClick={requestClose}>Cancel</Button>
                  <Button
                    variant="primary"
                    onClick={onExitSave}
                    disabled={!name.trim() || !defaultRoute || !isAnyDirty || tabErrors.timeslots.length > 0}
                  >Save</Button>
                </div>
              </div>
            </div>

            {/* Nested modals */}
            <CustomHolidayModal
              open={customHolidayModal.open}
              editing={customHolidayModal.editing}
              title={customHolidayModal.editing ? "Edit Custom Holiday" : "Custom Holiday"}
              inlineDestination
              onClose={() => setCustomHolidayModal({ open: false, editing: null })}
              onSave={onSaveCustomHoliday}
            />
            <LocationHolidayModal
              open={locationHolidayModal}
              selectedIds={locationHolidays}
              catalog={locationHolidaysCatalog}
              onClose={() => setLocationHolidayModal(false)}
              onSave={onSaveLocationHolidays}
            />
            <UnsavedChangesDialog
              open={confirmOpen}
              canSave={canSaveExit}
              onCancel={() => setConfirmOpen(false)}
              onDiscard={() => { setConfirmOpen(false); onClose?.(); }}
              onSaveExit={() => { setConfirmOpen(false); onExitSave(); }}
            />
          </>
        );
      };

      /* ============== Tab: Scheduler Information ============== */
      const SchedulerInfoTab = ({
        name, setName,
        defaultRoute, setDefaultRoute,
        isDefault, setIsDefault, defaultLocked = false,
        assignedDIDs, availableDIDs,
        didSearch, setDidSearch,
        didSelection, togglePick,
        moveToAssigned, moveToAvailable,
        filterBySearch,
        showErrors = false,
      }) => {
        const nameError = showErrors && !String(name || "").trim();
        const defaultRouteError = showErrors && !defaultRoute;
        const filteredAssigned = filterBySearch(assignedDIDs.map((n) => ({ number: n })));
        const filteredAvailable = filterBySearch(availableDIDs);
        const defaultRouteOptions = destinationOptions.map((o) => ({
          value: o.label,
          label: o.label,
          group: o.group,
        }));
        return (
          <div className="flex flex-col gap-6">
            {/* Top fields */}
            <div className="flex flex-col gap-5">
              <div className="grid grid-cols-2 gap-4">
                <Input label="Scheduler name" required value={name} onChange={setName} placeholder="Scheduler Name" error={nameError} />
                <Select
                  label="Default route"
                  required
                  value={defaultRoute}
                  onChange={setDefaultRoute}
                  options={defaultRouteOptions}
                  placeholder="Select destination"
                  error={defaultRouteError}
                />
              </div>
              {/* Make default scheduler */}
              <label className={`flex items-start gap-3 select-none ${defaultLocked ? "cursor-not-allowed" : "cursor-pointer"}`}>
                <span className="relative w-5 h-5 mt-0.5 shrink-0">
                  <input
                    type="checkbox"
                    checked={isDefault}
                    disabled={defaultLocked}
                    onChange={(e) => setIsDefault(e.target.checked)}
                    className="peer absolute inset-0 w-5 h-5 opacity-0 cursor-pointer disabled:cursor-not-allowed"
                  />
                  <span className={`pointer-events-none absolute inset-0 rounded-[4px] border-2 border-ink-500 peer-checked:border-primary-500 peer-checked:bg-primary-500 transition-colors ${defaultLocked ? "opacity-60" : ""}`} />
                  <svg
                    viewBox="0 0 24 24"
                    className="pointer-events-none absolute inset-0 w-full h-full opacity-0 peer-checked:opacity-100"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path

      /* ============== Tab: Time Slots ============== */
      const ALL_DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const SHORT_TO_DAY = ALL_DAYS.reduce((acc, d) => { acc[d.slice(0,3)] = d; return acc; }, {});
      const normalizeDays = (days) => {
        if (Array.isArray(days)) return days.filter((d) => ALL_DAYS.includes(d));
        if (!days) return [];
        const s = String(days);
        if (s === "Every day") return ALL_DAYS;
        if (s.includes(" - ")) {
          const [a, b] = s.split(" - ");
          const i = ALL_DAYS.indexOf(a);
          const j = ALL_DAYS.indexOf(b);
          if (i !== -1 && j !== -1) return ALL_DAYS.slice(Math.min(i,j), Math.max(i,j)+1);
        }
        if (ALL_DAYS.includes(s)) return [s];
        const parts = s.split(",").map((x) => x.trim()).filter(Boolean);
        const resolved = parts.map((p) => (ALL_DAYS.includes(p) ? p : SHORT_TO_DAY[p])).filter(Boolean);
        // Keep weekday order
        return ALL_DAYS.filter((d) => resolved.includes(d));
      };
      const formatDays = (arr) => {
        if (!arr || !arr.length) return "";
        if (arr.length === 7) return "Every day";
        const idx = arr.map((d) => ALL_DAYS.indexOf(d)).filter((i) => i !== -1).sort((a,b) => a-b);
        const consecutive = idx.length > 1 && idx.every((v, i) => i === 0 || v - idx[i-1] === 1);
        if (consecutive) return `${ALL_DAYS[idx[0]]} - ${ALL_DAYS[idx[idx.length-1]]}`;
        if (idx.length === 1) return ALL_DAYS[idx[0]];
        return idx.map((i) => ALL_DAYS[i].slice(0,3)).join(", ");
      };

      // Merge time slots that share the same destination + start + end time.
      // When `changedId` is provided and that slot's group actually grew due to
      // the change, bubble the resulting merged group to the top of the list.
      const mergeMatchingTimeSlots = (slots, changedId) => {
        // Pull start/end from `range` when they aren't set explicitly so seed
        // data (which uses `range` only) merges correctly with newly added slots.
        const fillTimes = (s) => {
          if (s.start && s.end) return s;
          const parts = (s.range || "").split(/\s*-\s*/);
          return { ...s, start: s.start || parts[0] || "", end: s.end || parts[1] || "" };
        };
        const normalized = slots.map(fillTimes);
        const order = [];
        const groups = new Map();    // key -> merged slot
        const groupIds = new Map();  // key -> Set of original slot ids contributing
        normalized.forEach((s) => {
          const key = `${(s.dest || "").trim()}|${(s.start || "").trim()}|${(s.end || "").trim()}`;
          if (groups.has(key)) {
            const existing = groups.get(key);
            const mergedDays = new Set([...normalizeDays(existing.days), ...normalizeDays(s.days)]);
            const combined = ALL_DAYS.filter((d) => mergedDays.has(d));
            existing.days = combined.length ? formatDays(combined) : "";
            groupIds.get(key).add(s.id);
          } else {
            groups.set(key, {
              ...s,
              range: s.start && s.end ? `${s.start} - ${s.end}` : (s.range || ""),
            });
            groupIds.set(key, new Set([s.id]));
            order.push(key);
          }
        });
        const merged = order.map((k) => groups.get(k));

        if (changedId) {
          let changedKey = null;
          for (const [k, ids] of groupIds.entries()) {
            if (ids.has(changedId)) { changedKey = k; break; }
          }
          if (changedKey && groupIds.get(changedKey).size > 1) {
            const idx = order.indexOf(changedKey);
            if (idx > 0) {
              const item = merged.splice(idx, 1)[0];
              merged.unshift(item);
            }
          }
        }
        return merged;
      };

                            xmlns="http://www.w3.org/2000/svg"
                          >
                            <path
                              d="M10.7092 15.8329C10.6576 15.833 10.6065 15.8227 10.559 15.8028C10.5114 15.7829 10.4683 15.7537 10.4322 15.7169L7.84716 13.1369C7.77369 13.0634 7.73242 12.9638 7.73242 12.8599C7.73242 12.756 7.77369 12.6564 7.84716 12.5829C7.92062 12.5094 8.02026 12.4682 8.12416 12.4682C8.22805 12.4682 8.32769 12.5094 8.40116 12.5829L10.6712 14.8529L15.5712 8.32091C15.6005 8.27727 15.6385 8.24007 15.6827 8.21156C15.7269 8.18305 15.7765 8.16383 15.8284 8.15507C15.8802 8.14631 15.9334 8.1482 15.9845 8.16061C16.0356 8.17301 16.0837 8.19569 16.1258 8.22726C16.1679 8.25882 16.2031 8.29862 16.2293 8.34423C16.2555 8.38984 16.2722 8.4403 16.2783 8.49255C16.2845 8.54481 16.2799 8.59776 16.2649 8.64819C16.2499 8.69862 16.2248 8.74548 16.1912 8.78591L11.0192 15.6779C10.986 15.7225 10.9437 15.7594 10.895 15.7861C10.8464 15.8129 10.7925 15.8288 10.7372 15.8329H10.7092Z"

      const TimeInput = ({ label, value, onChange, dirty }) => (
        <div className="flex flex-col gap-1">
          <label className="text-[14px] font-semibold leading-5 tracking-[0.018em] text-ink-700">{label}</label>
          <div className="relative">
            <input
              type="text"
              value={value ?? ""}
              onChange={(e) => onChange?.(e.target.value)}
              className={`h-8 w-full pl-3 pr-9 text-[14px] leading-5 text-ink-900 bg-white border ${dirty ? "border-ink-500" : "border-ink-200"} rounded hover:border-ink-400 focus:border-primary-500 focus:outline-none`}

      );

      // Structured HH : MM AM/PM picker used in the Time slots tab list view.
      // - Hour field: 1-12; typing a value > 12 clamps to 12; "00" is interpreted
      //   as 12; Arrow Up/Down step ±1 clamped at 1..12.
      // - Minute field: 0-59; typing > 59 clamps to 59; Arrow Up/Down step ±1
      //   clamped at 0..59.
      // - AM/PM: typing 'a'/'p' (any case) sets AM/PM; any other letter is
      //   ignored (field keeps the previously committed value); Arrow Up/Down
      //   toggles between the two.
      const TimePickerInput = ({ label, value, onChange, dirty, error = false }) => {
        const parseValue = (s) => {
          const m = String(s || "").match(/(\d{1,2})\s*:\s*(\d{1,2})\s*(AM|PM)/i);
          if (!m) return { h: "12", mm: "00", ap: "AM" };
          const hNum = Math.min(12, Math.max(1, parseInt(m[1], 10) || 12));
          const mNum = Math.min(59, Math.max(0, parseInt(m[2], 10) || 0));
          return { h: String(hNum).padStart(2, "0"), mm: String(mNum).padStart(2, "0"), ap: m[3].toUpperCase() };
        };
        const initial = parseValue(value);
        const [h, setH] = useState(initial.h);
        const [mm, setMm] = useState(initial.mm);
        const [ap, setAp] = useState(initial.ap);
        // Track the last serialized value we emitted, so that when the parent
        // echoes it back as a new `value` prop, we don't clobber our in-flight
        // local state (which may be an intermediate, unpadded form like "1").
        const lastEmittedRef = useRef(value);

        useEffect(() => {
          if (value === lastEmittedRef.current) return;
          const p = parseValue(value);
          setH(p.h); setMm(p.mm); setAp(p.ap);
          lastEmittedRef.current = value;
        }, [value]);

        const serialize = (hNum, mNum, apStr) => {
          const hh = String(hNum).padStart(2, "0");
          const mm2 = String(mNum).padStart(2, "0");
          return `${hh}:${mm2} ${apStr}`;
        };
        const commit = (hNum, mNum, apStr) => {
          const out = serialize(hNum, mNum, apStr);
          lastEmittedRef.current = out;
          onChange?.(out);
        };

        // Hour handlers
        const onHourChange = (s) => {
          const digits = (s || "").replace(/\D/g, "").slice(0, 2);
          if (digits === "") { setH(""); return; }
          let n = parseInt(digits, 10);
          if (digits.length === 2 && n === 0) n = 12;
          if (n > 12) n = 12;
          const display = digits.length === 2 ? String(n).padStart(2, "0") : String(n);
          setH(display);
          commit(n, parseInt(mm, 10) || 0, ap);
        };
        const onHourKeyDown = (e) => {
          if (e.key === "ArrowUp" || e.key === "ArrowDown") {
            e.preventDefault();
            const cur = parseInt(h, 10) || 12;
            const next = e.key === "ArrowUp" ? Math.min(12, cur + 1) : Math.max(1, cur - 1);
            setH(String(next).padStart(2, "0"));
            commit(next, parseInt(mm, 10) || 0, ap);
          }
        };
        const onHourBlur = () => {
          let n = parseInt(h, 10);
          if (!Number.isFinite(n) || n < 1) n = 12;
          if (n > 12) n = 12;
          setH(String(n).padStart(2, "0"));
          commit(n, parseInt(mm, 10) || 0, ap);
        };

        // Minute handlers
        const onMinuteChange = (s) => {
          const digits = (s || "").replace(/\D/g, "").slice(0, 2);
          if (digits === "") { setMm(""); return; }
          let n = parseInt(digits, 10);
          if (n > 59) n = 59;
          const display = digits.length === 2 ? String(n).padStart(2, "0") : String(n);
          setMm(display);
          commit(parseInt(h, 10) || 12, n, ap);
        };
        const onMinuteKeyDown = (e) => {
          if (e.key === "ArrowUp" || e.key === "ArrowDown") {
            e.preventDefault();
            const cur = parseInt(mm, 10) || 0;
            const next = e.key === "ArrowUp" ? Math.min(59, cur + 1) : Math.max(0, cur - 1);
            setMm(String(next).padStart(2, "0"));
            commit(parseInt(h, 10) || 12, next, ap);
          }
        };
        const onMinuteBlur = () => {
          let n = parseInt(mm, 10);
          if (!Number.isFinite(n) || n < 0) n = 0;
          if (n > 59) n = 59;
          setMm(String(n).padStart(2, "0"));
          commit(parseInt(h, 10) || 12, n, ap);
        };

        // AM/PM handlers — intercept key presses so only 'a'/'p' and arrows work.
        const onApKeyDown = (e) => {
          if (e.key === "ArrowUp" || e.key === "ArrowDown") {
            e.preventDefault();
            const next = ap === "AM" ? "PM" : "AM";
            setAp(next);
            commit(parseInt(h, 10) || 12, parseInt(mm, 10) || 0, next);
            return;
          }
          const k = (e.key || "").toLowerCase();
          if (k === "a") {
            e.preventDefault();
            setAp("AM");
            commit(parseInt(h, 10) || 12, parseInt(mm, 10) || 0, "AM");
            return;
          }
          if (k === "p") {
            e.preventDefault();
            setAp("PM");
            commit(parseInt(h, 10) || 12, parseInt(mm, 10) || 0, "PM");
            return;
          }
          // Let navigation keys through; swallow any other single-character
          // input so the field reverts to its previously-set value.
          if (e.key && e.key.length === 1) {
            e.preventDefault();
          }
        };

        return (
          <div className="flex flex-col gap-1">
            <label className="text-[14px] font-semibold leading-5 tracking-[0.018em] text-ink-700">{label}</label>
            <div className={`relative h-8 flex items-center border ${error ? "border-[#B3261E]" : dirty ? "border-ink-500" : "border-ink-200"} rounded bg-white ${error ? "hover:border-[#B3261E] focus-within:border-[#B3261E]" : "hover:border-ink-400 focus-within:border-primary-500"} px-3 pr-9`}>
              <input
                type="text"
                inputMode="numeric"
                value={h}
                onChange={(e) => onHourChange(e.target.value)}
                onKeyDown={onHourKeyDown}
                onBlur={onHourBlur}
                onFocus={(e) => e.target.select()}
                maxLength={2}
                aria-label={`${label} — hour`}
                className="w-6 text-center text-[14px] leading-5 text-ink-900 bg-transparent focus:outline-none"
              />
              <span className="text-ink-700 select-none">:</span>
              <input
                type="text"
                inputMode="numeric"
                value={mm}
                onChange={(e) => onMinuteChange(e.target.value)}
                onKeyDown={onMinuteKeyDown}
                onBlur={onMinuteBlur}
                onFocus={(e) => e.target.select()}
                maxLength={2}
                aria-label={`${label} — minute`}
                className="w-6 text-center text-[14px] leading-5 text-ink-900 bg-transparent focus:outline-none"
              />
              <input
                type="text"
                value={ap}
                readOnly
                onChange={() => {}}
                onKeyDown={onApKeyDown}
                onFocus={(e) => e.target.select()}
                aria-label={`${label} — AM or PM`}
                className="w-7 text-center text-[14px] leading-5 text-ink-900 bg-transparent focus:outline-none ml-1 cursor-default"
              />
              <Icon name="clock" size={16} className="absolute right-3 top-1/2 -translate-y-1/2 text-ink-500 pointer-events-none" />
            </div>
          </div>
        );
      };

      /* ============== Calendar view for time slots ============== */
      const parseTimeToMinutes = (str) => {
        const m = String(str || "").match(/(\d+)\s*:\s*(\d+)\s*(AM|PM)/i);
        if (!m) return 0;
        let h = parseInt(m[1], 10);
        const mins = parseInt(m[2], 10);
        const ampm = m[3].toUpperCase();
        if (ampm === "PM" && h !== 12) h += 12;
        if (ampm === "AM" && h === 12) h = 0;
        return h * 60 + mins;
      };
      const minutesToTimeString = (min) => {
        const total = Math.max(0, Math.min(24 * 60, min));
        const h24 = Math.floor(total / 60);
        const m = total % 60;
        const ampm = h24 < 12 ? "AM" : "PM";
        const h = h24 === 0 ? 12 : h24 > 12 ? h24 - 12 : h24;
        return `${h}:${String(m).padStart(2, "0")} ${ampm}`;
      };

      const TimeSlotsCalendarView = ({ timeSlots, overflowDest, onCreateSlot, onEditSlot, onMoveSlot, onDeleteSlot, onResizeSlot }) => {
        const HOUR_PX = 48;
        const STEP_MIN = 15; // snap to 15-minute increments
        const HOURS = Array.from({ length: 24 }, (_, i) => i); // 0..23

        const fmtHour = (h) => {
          const ampm = h < 12 ? "AM" : "PM";
          const dh = h === 0 ? 12 : h > 12 ? h - 12 : h;
          return `${dh}:00 ${ampm}`;
        };

        // Scroll container auto-scroll to 8 AM on mount; user can scroll up to 12 AM or down to end of day.
        const scrollRef = useRef(null);
        useEffect(() => {
          const target = 8 * HOUR_PX;
          const apply = () => { if (scrollRef.current) scrollRef.current.scrollTop = target; };
          // Apply immediately, then again after the browser has painted
          // (fixes cases where the scroller hasn't been laid out on the first effect tick,
          // e.g. when the calendar mounts inside a just-opened modal or inactive tab).
          apply();
          const r1 = requestAnimationFrame(apply);
          const r2 = requestAnimationFrame(apply);
          return () => { cancelAnimationFrame(r1); cancelAnimationFrame(r2); };
        }, []);

        // Pre-compute blocks per day (each block keeps a reference back to its slot)
        const blocksByDay = ALL_DAYS.reduce((acc, d) => { acc[d] = []; return acc; }, {});
        timeSlots.forEach((ts, idx) => {
          const days = normalizeDays(ts.days);
          const startMin = parseTimeToMinutes(ts.start || (ts.range || "").split(/\s*-\s*/)[0]);
          const endMin   = parseTimeToMinutes(ts.end   || (ts.range || "").split(/\s*-\s*/)[1]);
          const dur = Math.max(0, endMin - startMin);
          const rangeText = ts.range || `${ts.start} - ${ts.end}`;
          days.forEach((d) => {
            blocksByDay[d].push({
              id: `${ts.id}-${d}`,
              slotId: ts.id,
              slot: ts,
              day: d,
              startMin,
              endMin,
              insertIdx: idx,
              topPx: (startMin / 60) * HOUR_PX,
              heightPx: Math.max((dur / 60) * HOUR_PX, 28),
              range: rangeText,
              dest: ts.dest,
              slotIdx: idx + 1,
              lane: 0,
              totalLanes: 1,
            });
          });
        });

        // Compute lane layout: overlapping slots on the same day render side-by-side.
        // Slots created first take the leftmost lane (consistent with the "rule created first takes priority" banner).
        ALL_DAYS.forEach((d) => {
          const blocks = blocksByDay[d];
          if (blocks.length <= 1) return;
          // Chronological scan for overlap grouping; within each group,
          // assign lanes in original insertion (creation) order.
          const byStart = blocks.slice().sort((a, b) => a.startMin - b.startMin || a.insertIdx - b.insertIdx);
          let group = [];
          let groupMaxEnd = -Infinity;
          const flush = () => {
            if (!group.length) return;
            const ordered = group.slice().sort((a, b) => a.insertIdx - b.insertIdx);
            const laneEnds = []; // endMin of last block in each lane
            for (const b of ordered) {
              let laneIdx = -1;
              for (let i = 0; i < laneEnds.length; i++) {
                if (laneEnds[i] <= b.startMin) { laneIdx = i; break; }
              }
              if (laneIdx === -1) { laneEnds.push(b.endMin); laneIdx = laneEnds.length - 1; }
              else { laneEnds[laneIdx] = b.endMin; }
              b.lane = laneIdx;
            }
            const total = laneEnds.length;
            for (const b of ordered) b.totalLanes = total;
            group = [];
            groupMaxEnd = -Infinity;
          };
          for (const b of byStart) {
            if (group.length && b.startMin >= groupMaxEnd) flush();
            group.push(b);
            groupMaxEnd = Math.max(groupMaxEnd, b.endMin);
          }
          flush();
        });

        // Drag-to-create state
        const [dragCreate, setDragCreate] = useState(null);
        // dragCreate = { day, anchorMin, currentMin }  (null when not dragging)

        // Drag-to-move state
        const [dragMove, setDragMove] = useState(null);
        // dragMove = { slot, origDay, startMin, endMin, anchorY, deltaMin, hoverDay, moved }

        // Drag-to-resize state
        const [dragResize, setDragResize] = useState(null);
        // dragResize = { slot, origDay, startMin, endMin, anchorY, newEndMin }

        // Ref used to suppress body onClick right after a successful drag-move or drag-resize
        const justDraggedRef = useRef(false);

        const columnRefs = useRef({});

        const yToMinutes = (clientY, day) => {
          const colEl = columnRefs.current[day];
          if (!colEl) return 0;
          const r = colEl.getBoundingClientRect();
          const y = clientY - r.top;
          const raw = (y / HOUR_PX) * 60;
          const snapped = Math.round(raw / STEP_MIN) * STEP_MIN;
          return Math.max(0, Math.min(24 * 60, snapped));
        };

        const findHoverDay = (clientX) => {
          for (const d of ALL_DAYS) {
            const el = columnRefs.current[d];
            if (!el) continue;
            const r = el.getBoundingClientRect();
            if (clientX >= r.left && clientX < r.right) return d;
          }
          return null;
        };

        /* ---------- Drag-to-create (click empty space and drag) ---------- */
        const onDayMouseDown = (day) => (e) => {
          if (e.button !== 0) return; // left click only
          const anchor = yToMinutes(e.clientY, day);
          setDragCreate({ day, anchorMin: anchor, currentMin: anchor });
        };

        useEffect(() => {
          if (!dragCreate) return;
          const onMove = (e) => {
            const cur = yToMinutes(e.clientY, dragCreate.day);
            setDragCreate((d) => (d ? { ...d, currentMin: cur } : d));
          };
          const onUp = () => {
            setDragCreate((d) => {
              if (!d) return d;
              const start = Math.min(d.anchorMin, d.currentMin);
              const end   = Math.max(d.anchorMin, d.currentMin);
              // Require at least one step of drag; otherwise treat as click → no modal
              if (end - start >= STEP_MIN && onCreateSlot) {
                onCreateSlot({
                  day: d.day,
                  start: minutesToTimeString(start),
                  end: minutesToTimeString(end),
                });
              }
              return null;
            });
          };
          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onUp);
          return () => {
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseup", onUp);
          };
        }, [dragCreate && dragCreate.day]);

        /* ---------- Drag-to-move (mousedown on header strip) ---------- */
        const startDragMove = (block, e) => {
          if (e.button !== 0) return;
          e.stopPropagation();
          setDragMove({
            slot: block.slot,
            origDay: block.day,
            startMin: block.startMin,
            endMin: block.endMin,
            anchorY: e.clientY,
            deltaMin: 0,
            hoverDay: block.day,
            moved: false,
          });
        };

        useEffect(() => {
          if (!dragMove) return;
          const duration = dragMove.endMin - dragMove.startMin;
          const onMove = (e) => {
            setDragMove((d) => {
              if (!d) return d;
              const dy = e.clientY - d.anchorY;
              const rawDm = Math.round((dy / HOUR_PX) * 60 / STEP_MIN) * STEP_MIN;
              const newStart = Math.max(0, Math.min(24 * 60 - duration, d.startMin + rawDm));
              const clampedDelta = newStart - d.startMin;
              const hover = findHoverDay(e.clientX) || d.origDay;
              const movedEnough = Math.abs(dy) >= 3 || hover !== d.origDay;
              return { ...d, deltaMin: clampedDelta, hoverDay: hover, moved: d.moved || movedEnough };
            });
          };
          const onUp = () => {
            setDragMove((d) => {
              if (!d) return null;
              if (!d.moved) {
                // Treat as click on header → edit
                onEditSlot?.(d.slot, d.origDay);
                return null;
              }
              const newStartMin = d.startMin + d.deltaMin;
              const newEndMin   = d.endMin   + d.deltaMin;
              justDraggedRef.current = true; // suppress follow-up body onClick
              onMoveSlot?.({
                slotId: d.slot.id,
                newDay: d.hoverDay,
                origDay: d.origDay,
                newStart: minutesToTimeString(newStartMin),
                newEnd:   minutesToTimeString(newEndMin),
              });
              return null;
            });
          };
