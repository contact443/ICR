          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onUp);
          return () => {
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseup", onUp);
          };
        }, [dragMove ? dragMove.slot.id + "|" + dragMove.origDay : null]);

        /* ---------- Drag-to-resize (mousedown on bottom grip) ---------- */
        const startDragResize = (block, e) => {
          if (e.button !== 0) return;
          e.stopPropagation();
          setDragResize({
            slot: block.slot,
            origDay: block.day,
            startMin: block.startMin,
            endMin: block.endMin,
            anchorY: e.clientY,
            newEndMin: block.endMin,
          });
        };

        useEffect(() => {
          if (!dragResize) return;
          const onMove = (e) => {
            setDragResize((d) => {
              if (!d) return d;
              const dy = e.clientY - d.anchorY;
              const rawDm = Math.round((dy / HOUR_PX) * 60 / STEP_MIN) * STEP_MIN;
              // End must be at least startMin + STEP_MIN and at most 24 * 60
              const proposed = d.endMin + rawDm;
              const clamped = Math.max(d.startMin + STEP_MIN, Math.min(24 * 60, proposed));
              return { ...d, newEndMin: clamped };
            });
          };
          const onUp = () => {
            setDragResize((d) => {
              if (!d) return null;
              if (d.newEndMin !== d.endMin) {
                justDraggedRef.current = true;
                onResizeSlot?.({
                  slotId: d.slot.id,
                  origDay: d.origDay,
                  newEnd: minutesToTimeString(d.newEndMin),
                });
              }
              return null;
            });
          };
          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onUp);
          return () => {
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseup", onUp);
          };
        }, [dragResize ? dragResize.slot.id + "|" + dragResize.origDay : null]);

        /* ---------- Preview helpers ---------- */
        const createPreviewFor = (day) => {
          if (!dragCreate || dragCreate.day !== day) return null;
          const start = Math.min(dragCreate.anchorMin, dragCreate.currentMin);
          const end   = Math.max(dragCreate.anchorMin, dragCreate.currentMin);
          const top = (start / 60) * HOUR_PX;
          const height = Math.max(((end - start) / 60) * HOUR_PX, 4);
          return { top, height, range: `${minutesToTimeString(start)} - ${minutesToTimeString(end)}` };
        };

        const movePreviewFor = (day) => {
          if (!dragMove || dragMove.hoverDay !== day) return null;
          const newStart = dragMove.startMin + dragMove.deltaMin;
          const newEnd   = dragMove.endMin   + dragMove.deltaMin;
          const top = (newStart / 60) * HOUR_PX;
          const height = Math.max(((newEnd - newStart) / 60) * HOUR_PX, 28);
          return {
            top, height,
            range: `${minutesToTimeString(newStart)} - ${minutesToTimeString(newEnd)}`,
            dest: dragMove.slot.dest,
          };
        };

        return (
          <div className="bg-ink-50 rounded-lg overflow-hidden border border-[#CCCFD2]">
            <div className="px-4 py-3 text-center text-[14px] bg-[#E5E6E8] text-black">
              {overflowDest ? (
                <>Calls outside defined hours will route to <span className="font-semibold">{overflowDest}</span></>
              ) : (
                <span className="italic">Select a default destination</span>
              )}
            </div>
            <div
              ref={scrollRef}
              className="bg-white max-h-[480px] overflow-auto bvp-scroll select-none"
            >
              {/* Sticky header with day names */}
              <div className="grid grid-cols-[60px_repeat(7,minmax(0,1fr))] sticky top-0 bg-white z-10 border-b border-ink-100">
                <div className="h-9 flex items-center justify-start pl-3 text-[11px] text-ink-600">Time</div>
                {ALL_DAYS.map((d) => (
                  <div key={d} className="h-9 flex items-center justify-center text-[12px] text-ink-700 border-l border-ink-100">{d}</div>
                ))}
              </div>
              {/* Body grid */}
              <div className="relative grid grid-cols-[60px_repeat(7,minmax(0,1fr))]">
                {/* Time column */}
                <div>
                  {HOURS.map((h) => (
                    <div
                      key={h}
                      className="flex items-start justify-start pl-3 pt-1 text-[11px] text-ink-500 border-b border-ink-50"
                      style={{ height: HOUR_PX }}
                    >
                      {h === 0 ? "" : fmtHour(h)}
                    </div>
                  ))}
                </div>
                {/* Day columns */}
                {ALL_DAYS.map((d) => {
                  const createPv = createPreviewFor(d);
                  const movePv   = movePreviewFor(d);
                  return (
                    <div
                      key={d}
                      ref={(el) => { columnRefs.current[d] = el; }}
                      className="relative border-l border-ink-100 cursor-crosshair"
                      onMouseDown={onDayMouseDown(d)}
                    >
                      {HOURS.map((h) => (
                        <div key={h} className="border-b border-ink-50" style={{ height: HOUR_PX }} />
                      ))}
                      {/* Existing time slot blocks */}
                      {blocksByDay[d].map((b) => {
                        const beingMoved =
                          dragMove &&
                          dragMove.slot.id === b.slotId &&
                          dragMove.origDay === b.day;
                        // Live resize preview height for this block
                        let blockHeight = b.heightPx;
                        let blockRange = b.range;
                        const beingResized =
                          dragResize &&
                          dragResize.slot.id === b.slotId &&
                          dragResize.origDay === b.day;
                        if (beingResized) {
                          const dur = Math.max(0, dragResize.newEndMin - dragResize.startMin);
                          blockHeight = Math.max((dur / 60) * HOUR_PX, 28);
                          blockRange = `${minutesToTimeString(dragResize.startMin)} - ${minutesToTimeString(dragResize.newEndMin)}`;
                        }
                        const lanePct = 100 / b.totalLanes;
                        const leftPct = b.lane * lanePct;
                        return (
                          <div
                            key={b.id}
                            className={`group absolute rounded-[3px] border border-[#B2B7BC] bg-[#ECEDEF] overflow-hidden flex flex-col cursor-pointer ${beingMoved ? "opacity-40" : ""}`}
                            style={{
                              top: b.topPx,
                              height: blockHeight,
                              left: `calc(${leftPct}% + 3px)`,
                              width: `calc(${lanePct}% - 6px)`,
                            }}
                            onMouseDown={(e) => e.stopPropagation()}
                            onClick={(e) => {
                              e.stopPropagation();
                              if (justDraggedRef.current) {
                                justDraggedRef.current = false;
                                return;
                              }
                              onEditSlot?.(b.slot, b.day);
                            }}
                          >
                            <div
                              className="relative bg-[#7F888F] text-white px-1.5 py-0.5 text-[10px] leading-[14px] font-medium whitespace-nowrap overflow-hidden cursor-grab active:cursor-grabbing"
                              onMouseDown={(e) => startDragMove(b, e)}
                              onClick={(e) => e.stopPropagation()}
                              title="Click to edit · drag to move"
                            >
                              <span className="block truncate pr-5">{blockRange}</span>
                              {/* X close button, revealed on hover */}
                              <button
                                type="button"
                                aria-label="Delete time slot"
                                className="hidden group-hover:flex absolute top-0 right-0 h-full w-5 items-center justify-center text-white hover:bg-[#244C91] cursor-pointer"
                                onMouseDown={(e) => { e.stopPropagation(); e.preventDefault(); }}
                                onClick={(e) => {
                                  e.stopPropagation();
                                  e.preventDefault();
                                  onDeleteSlot?.(b.slotId);
                                }}
                              >
                                <svg width="8" height="8" viewBox="0 0 8 8" fill="none" aria-hidden="true">
                                  <path d="M1 1L7 7M7 1L1 7" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" />
                                </svg>
                              </button>
                            </div>
                            <div className="px-1.5 py-1 text-[11px] leading-[14px] text-ink-900 overflow-hidden flex-1">
                              {b.dest}
                            </div>
                            {/* Bottom resize grip */}
                            <div
                              role="button"
                              aria-label="Drag to resize"
                              title="Drag to resize"
                              className="h-[10px] w-full flex items-center justify-center cursor-ns-resize select-none"
                              onMouseDown={(e) => startDragResize(b, e)}
                              onClick={(e) => e.stopPropagation()}
                            >
                              <svg width="11" height="4" viewBox="0 0 11 4" fill="none" aria-hidden="true">
                                <path d="M10.3125 2.66667H0.6875C0.309375 2.66667 0 2.96667 0 3.33333C0 3.7 0.309375 4 0.6875 4H10.3125C10.6906 4 11 3.7 11 3.33333C11 2.96667 10.6906 2.66667 10.3125 2.66667ZM10.3125 0H0.6875C0.309375 0 0 0.3 0 0.666667C0 1.03333 0.309375 1.33333 0.6875 1.33333H10.3125C10.6906 1.33333 11 1.03333 11 0.666667C11 0.3 10.6906 0 10.3125 0Z" fill="#99A0A6"/>
                              </svg>
                            </div>
                          </div>
                        );
                      })}
                      {/* Drag-to-create preview */}
                      {createPv && (
                        <div
                          className="absolute left-[3px] right-[3px] rounded-[3px] border border-[#244C91] bg-[#D1DAEB]/80 overflow-hidden flex flex-col pointer-events-none"
                          style={{ top: createPv.top, height: createPv.height }}
                        >
                          <div className="bg-[#244C91] text-white px-1.5 py-0.5 text-[10px] leading-[14px] font-medium whitespace-nowrap overflow-hidden text-ellipsis">
                            {createPv.range}
                          </div>
                        </div>
                      )}
                      {/* Drag-to-move preview */}
                      {movePv && (
                        <div
                          className="absolute left-[3px] right-[3px] rounded-[3px] border border-[#244C91] bg-[#D1DAEB]/70 overflow-hidden flex flex-col pointer-events-none"
                          style={{ top: movePv.top, height: movePv.height }}
                        >
                          <div className="bg-[#244C91] text-white px-1.5 py-0.5 text-[10px] leading-[14px] font-medium whitespace-nowrap overflow-hidden text-ellipsis">
                            {movePv.range}
                          </div>
                          <div className="px-1.5 py-1 text-[11px] leading-[14px] text-ink-900 overflow-hidden">
                            {movePv.dest}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      /* ============== Time Slot modal (create from drag OR edit existing) ============== */
      const TimeSlotModal = ({ open, mode, slotId, day, start, end, initialDest, onClose, onSave }) => {
        const [startT, setStartT] = useState(start || "");
        const [endT, setEndT] = useState(end || "");
        const [dest, setDest] = useState(initialDest || "");
        // Snapshot of the values at the moment the modal opens — used to detect whether the user has made any changes.
        const [initial, setInitial] = useState({ start: start || "", end: end || "", dest: initialDest || "" });
        useEffect(() => {
          if (open) {
            setStartT(start || "");
            setEndT(end || "");
            setDest(initialDest || "");
            setInitial({ start: start || "", end: end || "", dest: initialDest || "" });
          }
        }, [open, start, end, initialDest, slotId]);
        const destOpts = destinationOptions.map((d) => ({ value: d.label, label: d.label, group: d.group }));
        const fieldsFilled = Boolean(startT && endT && dest);
        const startEndValid = fieldsFilled
          ? parseTimeToMinutes(startT) < parseTimeToMinutes(endT)
          : true;
        const hasChanges = startT !== initial.start || endT !== initial.end || dest !== initial.dest;
        const canSave = fieldsFilled && startEndValid && hasChanges;
        const handleSave = () => {
          if (!canSave) return;
          onSave({ slotId, day, start: startT, end: endT, dest });
        };
        return (
          <Modal
            open={open}
            onClose={onClose}
            title="Time Slot"
            width={368}
            footer={
              <>
                <Button variant="secondary" onClick={onClose}>Cancel</Button>
                <Button variant="primary" onClick={handleSave} disabled={!canSave}>Save</Button>
              </>
            }
          >
            <div className="flex flex-col gap-4 py-4">
              <div className="text-[14px] leading-5 text-ink-900">
                <span className="font-semibold">Weekday:</span> {day}
              </div>
              <div className="grid grid-cols-2 gap-3">
                <TimePickerInput label="Start time" value={startT} onChange={setStartT} error={fieldsFilled && !startEndValid} />
                <TimePickerInput label="End time"   value={endT}   onChange={setEndT}   error={fieldsFilled && !startEndValid} />
              </div>
              {fieldsFilled && !startEndValid && (
                <div className="flex items-center gap-1 -mt-2 text-[12px] leading-4 text-[#B3261E]">
                  <Icon name="warning-circle" size={14} className="text-[#B3261E]" />
                  <span>Start time must be before end time.</span>
                </div>
              )}
              <Select
                label="Destination"
                value={dest}
                onChange={setDest}
                options={destOpts}
                placeholder="Select destination"
              />
            </div>
          </Modal>
        );
      };

      const TimeSlotsTab = ({ timeSlots, setTimeSlots, defaultRoute, hasErrors = false, showErrors = false }) => {
        // If the user lands on this tab while there are validation errors,
        // open straight into the list view since errors live there. The
        // tab is conditionally mounted by the parent, so this initial-state
        // check runs each time the user navigates back to Time Slots.
        const [view, setView] = useState(hasErrors ? "list" : "calendar");
        const [editingIds, setEditingIds] = useState(() => new Set());
        const [originals, setOriginals] = useState({});
        const [newIds, setNewIds] = useState(() => new Set());
        const [slotModal, setSlotModal] = useState({ open: false, mode: "create", slotId: null, day: "", start: "", end: "", initialDest: "" });
        const overflowDest = defaultRoute || "";

        // Note: invalid/unsaved time slots are intentionally NOT discarded
        // when the user switches tabs. They stay in the list with their
        // editing-state stroke so the user can come back and finish them.
        // The Time Slots tab indicator surfaces the missing fields, and the
        // modal's Save button is disabled while any slot is invalid.

        const handleDragCreate = ({ day, start, end }) => {
          setSlotModal({ open: true, mode: "create", slotId: null, day, start, end, initialDest: "" });
        };
        const handleEditSlot = (slot, day) => {
          const n = normalize(slot);
          const d = day || normalizeDays(n.days)[0] || "";
          setSlotModal({
            open: true,
            mode: "edit",
            slotId: n.id,
            day: d,
            start: n.start,
            end: n.end,
            initialDest: n.dest || "",
          });
        };
        const handleMoveSlot = ({ slotId, newDay, origDay, newStart, newEnd }) => {
          setTimeSlots((arr) => {
            const idx = arr.findIndex((s) => s.id === slotId);
            if (idx === -1) return arr;
            const s = arr[idx];
            const daysArr = normalizeDays(s.days);

            // Single-day slot → just move it
            if (daysArr.length <= 1) {
              const updated = arr.map((it, i) => i === idx ? {
                ...it,
                days: newDay,
                start: newStart,
                end: newEnd,
                range: `${newStart} - ${newEnd}`,
              } : it);
              return mergeMatchingTimeSlots(updated, slotId);
            }

            // Multi-day slot → split the dragged day off into its own new slot
            const remaining = daysArr.filter((d) => d !== origDay);
            const remainingStr = formatDays(ALL_DAYS.filter((d) => remaining.includes(d)));
            const newId = `ts-${Date.now()}`;
            const newSlot = {
              id: newId,
              days: newDay,
              start: newStart,
              end: newEnd,
              range: `${newStart} - ${newEnd}`,
              dest: s.dest,
            };
            const updated = arr.slice();
            updated[idx] = { ...s, days: remainingStr };
            // Add new split-off slot at the top of the list
            return mergeMatchingTimeSlots([newSlot, ...updated], newId);
          });
        };
        const handleResizeSlot = ({ slotId, origDay, newEnd }) => {
          setTimeSlots((arr) => {
            const idx = arr.findIndex((s) => s.id === slotId);
            if (idx === -1) return arr;
            const s = arr[idx];
            const daysArr = normalizeDays(s.days);
            const startTime = s.start || (s.range || "").split(/\s*-\s*/)[0] || "";

            // Single-day slot → update end time in place
            if (daysArr.length <= 1) {
              const updated = arr.map((it, i) => i === idx ? {
                ...it,
                end: newEnd,
                range: `${startTime} - ${newEnd}`,
              } : it);
              return mergeMatchingTimeSlots(updated, slotId);
            }

            // Multi-day slot → split off the resized day into its own slot
            const remaining = daysArr.filter((d) => d !== origDay);
            const remainingStr = formatDays(ALL_DAYS.filter((d) => remaining.includes(d)));
            const newId = `ts-${Date.now()}`;
            const newSlot = {
              id: newId,
              days: origDay,
              start: startTime,
              end: newEnd,
              range: `${startTime} - ${newEnd}`,
              dest: s.dest,
            };
            const updated = arr.slice();
            updated[idx] = { ...s, days: remainingStr };
            return mergeMatchingTimeSlots([newSlot, ...updated], newId);
          });
        };
        const handleDeleteSlot = (slotId) => {
          setTimeSlots((arr) => arr.filter((s) => s.id !== slotId));
        };
        const handleModalSave = ({ slotId, day, start, end, dest }) => {
          const id = slotId || `ts-${Date.now()}`;
          setTimeSlots((arr) => {
            const updated = slotId
              ? arr.map((s) => s.id === slotId ? {
                  ...s,
                  days: day,
                  start,
                  end,
                  range: `${start} - ${end}`,
                  dest,
                } : s)
              : [
                  { id, days: day, start, end, range: `${start} - ${end}`, dest },
                  ...arr,
                ];
            return mergeMatchingTimeSlots(updated, id);
          });
          setSlotModal({ open: false, mode: "create", slotId: null, day: "", start: "", end: "", initialDest: "" });
        };

        const parseRange = (r) => {
          const parts = (r || "").split(/\s*-\s*/);
          return { start: (parts[0] || "9:00 AM"), end: (parts[1] || "5:00 PM") };
        };
        const normalize = (ts) => {
          if (ts.start && ts.end) return ts;
          const { start, end } = parseRange(ts.range);
          return { ...ts, start, end };
        };

        const destOpts = destinationOptions.map((d) => ({ value: d.label, label: d.label, group: d.group }));

        const addRow = () => {
          const id = `ts-${Date.now()}`;
          const newSlot = {
            id,
            days: "",
            start: "09:00 AM",
            end: "05:00 PM",
            range: "09:00 AM - 05:00 PM",
            dest: "",
          };
          setTimeSlots((ts) => [newSlot, ...ts]);
          setEditingIds((prev) => { const n = new Set(prev); n.add(id); return n; });
          setNewIds((prev) => { const n = new Set(prev); n.add(id); return n; });
          setOriginals((prev) => ({ ...prev, [id]: { ...newSlot } }));
        };
        const del = (id) => {
          setTimeSlots((ts) => ts.filter((t) => t.id !== id));
          setEditingIds((prev) => { const n = new Set(prev); n.delete(id); return n; });
          setNewIds((prev) => { const n = new Set(prev); n.delete(id); return n; });
          setOriginals((prev) => { const { [id]: _, ...rest } = prev; return rest; });
        };
        // True when a slot has all required fields filled in correctly:
        // day(s), destination, and start strictly before end.
        const isSlotValid = (s) => {
          if (!s) return false;
          const hasStart = !!(s.start && String(s.start).trim());
          const hasEnd   = !!(s.end   && String(s.end).trim());
          const startEndValid = hasStart && hasEnd
            ? parseTimeToMinutes(s.start) < parseTimeToMinutes(s.end)
            : false;
          return Boolean(
            normalizeDays(s.days).length > 0 &&
            s.dest && String(s.dest).trim() &&
            startEndValid
          );
        };
        const update = (id, patch) => setTimeSlots((ts) => {
          let updatedSlot = null;
          const next = ts.map((t) => {
            if (t.id !== id) return t;
            const upd = { ...t, ...patch };
            if ("start" in patch || "end" in patch) {
              upd.range = `${upd.start ?? ""} - ${upd.end ?? ""}`;
            }
            updatedSlot = upd;
            return upd;
          });
          // Auto-commit: when a slot becomes valid, exit editing mode so the
          // card and field borders return to their resting (non-stroked)
          // state. Invalid slots stay in editing mode (with stroke).
          if (updatedSlot && isSlotValid(updatedSlot)) {
            queueMicrotask(() => {
              setEditingIds((prev) => {
                if (!prev.has(id)) return prev;
                const n = new Set(prev); n.delete(id); return n;
              });
              setNewIds((prev) => {
                if (!prev.has(id)) return prev;
                const n = new Set(prev); n.delete(id); return n;
              });
              setOriginals((prev) => {
                if (!prev[id]) return prev;
                const { [id]: _, ...rest } = prev; return rest;
              });
              setTimeSlots((arr) => mergeMatchingTimeSlots(arr, id));
            });
          }
          return next;
        });
        const enterEdit = (slot) => {
          setEditingIds((prev) => {
            if (prev.has(slot.id)) return prev;
            const n = new Set(prev); n.add(slot.id); return n;
          });
          setOriginals((prev) => (prev[slot.id] ? prev : { ...prev, [slot.id]: { ...slot } }));
        };
        const isDirty = (id, field, currentValue) => {
          if (!editingIds.has(id)) return false;
          const orig = originals[id];
          if (!orig) return false;
          const a = orig[field];
          const b = currentValue;
          return JSON.stringify(a ?? "") !== JSON.stringify(b ?? "");
        };

        return (
          <div className="flex flex-col gap-4">
            {/* Info banner */}
            <div className="flex items-center gap-3 h-8 px-4 bg-[#E8EDF5] rounded-lg">
              <Icon name="warning-circle" size={16} className="text-[#142B53] shrink-0" />
              <p className="text-[13px] leading-5 text-[#001221] font-semibold">
                If time ranges overlap, the rule created first takes priority.
              </p>
            </div>

            {/* Toolbar */}
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="inline-flex h-7 rounded overflow-hidden">
                  <PortalTooltip text="Calendar view">
                    <button
                      type="button"
                      onClick={() => setView("calendar")}
                      aria-label="Calendar view"
                      className={`w-7 h-7 flex items-center justify-center transition-colors border rounded-l ${view === "calendar" ? "bg-[#D1DAEB] text-[#142B53] border-[#142B53] z-10" : "bg-[#F2F2F3] text-[#7F888F] border-[#CCCFD2] hover:text-ink-900"}`}
                    >
                      <Icon name="calendar-today" size={14} />
                    </button>
                  </PortalTooltip>
                  <PortalTooltip text="List view">
                    <button
                      type="button"
                      onClick={() => setView("list")}
                      aria-label="List view"
                      className={`w-7 h-7 flex items-center justify-center transition-colors border -ml-px rounded-r ${view === "list" ? "bg-[#D1DAEB] text-[#142B53] border-[#142B53] z-10" : "bg-[#F2F2F3] text-[#7F888F] border-[#CCCFD2] hover:text-ink-900"}`}
                    >
                      <Icon name="slot-icon" size={14} />
                    </button>
                  </PortalTooltip>
                </div>
                <span className="text-[14px] text-ink-700">
                  {view === "calendar"
                    ? "Drag or click to add and adjust time slots"
                    : `${timeSlots.length} time slot${timeSlots.length === 1 ? "" : "s"}`}
                </span>
              </div>
              {view === "list" && (
                <button
                  type="button"
                  onClick={addRow}
                  className="inline-flex items-center gap-1 h-7 px-3 rounded bg-white border border-[#A3B6D7] text-[#244C91] text-[11px] font-bold uppercase tracking-btnSm hover:bg-[#D1DAEB] transition-colors"
                >
                  <Icon name="plus" size={14} />
                  Time slot
                </button>
              )}
            </div>

            {view === "calendar" ? (
              <TimeSlotsCalendarView
                timeSlots={timeSlots}
                overflowDest={overflowDest}
                onCreateSlot={handleDragCreate}
                onEditSlot={handleEditSlot}
                onMoveSlot={handleMoveSlot}
                onDeleteSlot={handleDeleteSlot}
                onResizeSlot={handleResizeSlot}
              />
            ) : (
            /* Grey panel (list view) */
            <div className="bg-ink-50 rounded-lg overflow-hidden border border-[#CCCFD2]">
              <div className="px-4 py-3 text-center text-[14px] bg-[#E5E6E8] text-black">
                {overflowDest ? (
                  <>Calls outside defined hours will route to <span className="font-semibold">{overflowDest}</span></>
                ) : (
                  <span className="italic">Select a default destination</span>
                )}
              </div>
              <div className="p-4">
                {timeSlots.length === 0 ? (
                  <div className="bg-white rounded-lg py-12 flex flex-col items-center gap-5">
                    <div className="w-16 h-16 rounded-full bg-[#E5E6E8] flex items-center justify-center">
                      <Icon name="slot-icon" size={32} className="text-[#142B53]" />
                    </div>
                    <div className="text-[14px] text-ink-700">There are no Time Slots defined</div>
                  </div>
                ) : (
                  <div className="flex flex-col gap-3">
                    {timeSlots.map((raw, idx) => {
                      const ts = normalize(raw);
                      const editing = editingIds.has(ts.id);
                      const daysDirty  = isDirty(ts.id, "days",  ts.days);
                      const destDirty  = isDirty(ts.id, "dest",  ts.dest);
                      const startDirty = isDirty(ts.id, "start", ts.start);
                      const endDirty   = isDirty(ts.id, "end",   ts.end);
                      const ensureEdit = () => enterEdit(ts);
                      const hasStart = !!(ts.start && String(ts.start).trim());
                      const hasEnd   = !!(ts.end   && String(ts.end).trim());
                      // A slot's start time must be strictly before its end time.
                      const startEndValid = hasStart && hasEnd
                        ? parseTimeToMinutes(ts.start) < parseTimeToMinutes(ts.end)
                        : true;
                      // When the user has come back to the Time Slots tab
                      // after leaving it with errors present, light up only
                      // the offending fields with a red stroke. Cards keep
                      // their existing editing/resting border treatment.
                      const hasDays = normalizeDays(ts.days).length > 0;
                      const hasDest = !!(ts.dest && String(ts.dest).trim());
                      const daysError  = showErrors && !hasDays;
                      const destError  = showErrors && !hasDest;
                      const startInvalid = (hasStart && hasEnd && !startEndValid);
                      const startError = (showErrors && !hasStart) || startInvalid;
                      const endError   = (showErrors && !hasEnd)   || startInvalid;
                      return (
                        <div key={ts.id} className={`bg-white rounded-lg border ${editing ? "border-ink-500" : "border-transparent"}`}>
                          <div className="flex items-center justify-between px-4 pt-3 pb-2">
                            <h4 className="text-[14px] font-semibold text-ink-900">Slot {idx + 1}</h4>
                            <IconButton name="trash" title="Remove" onClick={() => del(ts.id)} />
                          </div>
                          <div className="h-px bg-[#E5E6E8] mx-4" />
                          <div className="flex flex-col gap-4 p-4">
                            <div className="grid grid-cols-2 gap-4">
                              <DaysMultiSelect label="Day(s)" value={ts.days} dirty={daysDirty} error={daysError}
                                placeholder="Select week day(s)"
                                onChange={(v) => { ensureEdit(); update(ts.id, { days: v }); }} />
                              <Select label="Destination" value={ts.dest} dirty={destDirty} error={destError}
                                placeholder="Select destination"
                                onChange={(v) => { ensureEdit(); update(ts.id, { dest: v }); }}
                                options={destOpts} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                              <TimePickerInput label="Start time" value={ts.start} dirty={startDirty} error={startError}
                                onChange={(v) => { ensureEdit(); update(ts.id, { start: v }); }} />
                              <TimePickerInput label="End time"   value={ts.end}   dirty={endDirty}   error={endError}
                                onChange={(v) => { ensureEdit(); update(ts.id, { end: v }); }} />
                            </div>
                            {startInvalid && (
                              <div className="flex items-center gap-1 -mt-2 text-[12px] leading-4 text-[#B3261E]">
                                <Icon name="warning-circle" size={14} className="text-[#B3261E]" />
                                <span>Start time must be before end time.</span>
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
            )}

            <TimeSlotModal
              open={slotModal.open}
              mode={slotModal.mode}
              slotId={slotModal.slotId}
              day={slotModal.day}
              start={slotModal.start}
              end={slotModal.end}
              initialDest={slotModal.initialDest}
              onClose={() => setSlotModal({ open: false, mode: "create", slotId: null, day: "", start: "", end: "", initialDest: "" })}
              onSave={handleModalSave}
            />
          </div>
        );
      };

      /* ============== Tab: Holidays (focused) ============== */
      // Pill badge showing "+N more" with a hover tooltip listing the overflow values.
      const MorePill = ({ count, tooltipLines = [], size = "sm" }) => {
        const cls = size === "sm"
          ? "inline-flex items-center justify-center h-[18px] px-2 rounded-[10px] bg-[#F2F2F3] text-[#001221] text-[12px] font-normal whitespace-nowrap"
          : "inline-flex items-center justify-center h-[20px] px-2 rounded-[10px] bg-[#F2F2F3] text-[#001221] text-[12px] font-normal whitespace-nowrap";
        const pill = <span className={cls}>+{count} more</span>;
        if (!tooltipLines || tooltipLines.length === 0) return pill;
        return (
          <PortalTooltip text={tooltipLines.join(", ")}>
            {pill}
          </PortalTooltip>
        );
      };

      const HolidayRow = ({ kind, name, dates, slots, when, recurrence, dest, onEdit, onDelete }) => {
        const badgeBg = kind === "custom" ? "bg-[#0E5F8A]" : "bg-[#142B53]";
        const badgeText = kind === "custom" ? "C" : "L";
        const hasMultipleDates = Array.isArray(dates) && dates.length > 1;
        const hasMultipleSlots = Array.isArray(slots) && slots.length > 1;
        // Build time piece
        const timePiece = (() => {
          if (hasMultipleSlots) return "Multiple time slots";
          if (Array.isArray(slots) && slots.length === 1) return `${slots[0].start} - ${slots[0].end}`;
          return null; // falls back to the passed-in `when`
        })();
        // Build date piece
        const datePiece = (() => {
          if (hasMultipleDates) {
            const first = dates[0];
            const moreCount = dates.length - 1;
            return { first, moreCount };
          }
          return null; // use `when`
        })();
        const datesTooltip = hasMultipleDates ? dates.join(", ") : "";
        const slotsTooltip = hasMultipleSlots
          ? slots.map((s) => `${s.start} - ${s.end}`).join(", ")
          : "";
        const DatePart = () => {
          if (datePiece) {
            return (
              <PortalTooltip text={datesTooltip}>
                <span className="cursor-help">Multiple dates</span>
              </PortalTooltip>
            );
          }
          return <span>{when.split(" • ")[0]}</span>;
        };
        const TimePart = () => {
          const txt = timePiece || (when.split(" • ")[1] || "");
          if (hasMultipleSlots) {
            return (
              <PortalTooltip text={slotsTooltip}>
                <span className="cursor-help">{txt}</span>
              </PortalTooltip>
            );
          }
          return <span>{txt}</span>;
        };
        const WhenContent = () => {
          if (!datePiece && !hasMultipleSlots) {
            return <span className="text-[12px] text-ink-900 whitespace-nowrap">{when}</span>;
          }
          return (
            <span className="inline-flex items-center gap-1.5 text-[12px] text-ink-900 whitespace-nowrap">
              <DatePart />
              <span className="text-ink-900">•</span>
              <TimePart />
            </span>
          );
        };
        return (
          <div className="flex items-center justify-between gap-3 px-2.5 py-1.5 rounded-lg bg-[#F2F2F3]">
            <div className="flex flex-col gap-1 min-w-0">
              <div className="flex items-center gap-6 flex-wrap">
                <div className="flex items-center gap-2.5">
                  <span className={`inline-flex items-center justify-center w-4 h-4 rounded-full ${badgeBg}`}>
                    <span className="text-white text-[10px] font-bold leading-none">{badgeText}</span>
                  </span>
                  <div className="flex items-center gap-1 min-w-0 max-w-[240px]">
                    <Icon name="calendar" size={14} className="text-ink-600 shrink-0" />
                    <TruncationTooltip text={name} className="flex-1" innerClassName="text-[12px] font-semibold text-ink-900" />
                  </div>
                </div>
                <WhenContent />
                <span className="inline-flex items-center justify-center h-[18px] px-2 py-1 bg-white border border-[#CCCFD2] rounded-[10px] text-[10px] text-ink-600 tracking-[0.25px] whitespace-nowrap">
                  {recurrence}
                </span>
              </div>
              <div className="flex items-center gap-2 pl-[26px]">
                <Icon name="arrow-right" size={14} className="text-ink-600" />
                <span className="text-[12px] text-ink-700">{dest}</span>
              </div>
            </div>
            <div className="flex items-center gap-1.5 shrink-0">
              {onEdit && <IconButton name="edit" title="Edit" onClick={onEdit} size={16} />}
              <IconButton name="trash" title={onEdit ? "Delete" : "Remove"} onClick={onDelete} />
            </div>
          </div>
        );
      };

      const HolidaysTab = ({
        customHolidays, locationHolidays, locationHolidaysCatalog = locationHolidayCatalog,
        onAddCustom, onEditCustom, onDeleteCustom,
        onAddLocation, onDeleteLocation,
      }) => {
        const locItems = locationHolidays
          .map((id) => locationHolidaysCatalog.find((l) => l.id === id))
          .filter(Boolean);
        const outlineBtn = "inline-flex items-center gap-1 h-6 pl-1 pr-2 rounded bg-white border border-[#A3B6D7] text-[#244C91] text-[12px] font-bold uppercase tracking-btnSm hover:bg-[#D1DAEB] transition-colors disabled:bg-[#E5E6E8] disabled:border-[#E5E6E8] disabled:text-[#4C5863] disabled:cursor-not-allowed";
        return (
          <div className="flex flex-col gap-3">
            {/* Info alert */}
            <div className="flex items-center gap-2 h-8 px-4 bg-[#E8EDF5] rounded-lg">
              <Icon name="warning-circle" size={17} className="text-[#142B53] shrink-0" />
              <span className="text-[14px] font-semibold text-ink-900 tracking-[0.25px]">Custom holidays set here take priority over location holidays.</span>
            </div>

            <div className="flex flex-col gap-9 pt-4">
              {/* Custom holidays */}
              <div className="flex flex-col gap-2">
                <div className="flex items-center gap-2 pb-2">
                  <h4 className="text-[14px] font-semibold text-ink-900 tracking-[0.25px]">Custom holidays</h4>
                  <PortalTooltip text="These holidays apply only to this scheduler" className="group">
                    <Icon name="info" size={14} className="text-ink-500 cursor-help group-hover:text-[#244C91] transition-colors" />
                  </PortalTooltip>
                </div>
                {customHolidays.length === 0 && (
                  <div className="text-[12px] text-ink-500 italic">No custom holidays yet.</div>
                )}
                {customHolidays.map((h) => (
                  <HolidayRow
                    key={h.id}
                    kind="custom"
                    name={h.name}
                    when={h.when}
                    dates={h.dates}
                    slots={h.slots}
                    recurrence={h.recurrence === "yearly" ? "Yearly" : "One-time"}
                    dest={h.dest}
                    onEdit={() => onEditCustom(h)}
                    onDelete={() => onDeleteCustom(h.id)}
                  />
                ))}
                <div className="pt-1">
                  <button type="button" className={outlineBtn} onClick={onAddCustom}>
                    <Icon name="plus" size={14} />
                    Custom holiday
                  </button>
                </div>
              </div>

              {/* Location holidays */}
              <div className="flex flex-col gap-2">
                <div className="flex items-center gap-2 pb-2">
                  <h4 className="text-[14px] font-semibold text-ink-900 tracking-[0.25px]">Location holidays</h4>
                  <PortalTooltip text="List of predefined holidays for this location" className="group">
                    <Icon name="info" size={14} className="text-ink-500 cursor-help group-hover:text-[#244C91] transition-colors" />
                  </PortalTooltip>
                </div>
                {locItems.length === 0 && (
                  <div className="text-[12px] text-ink-500 italic">No location holidays selected.</div>
                )}
                {locItems.map((h) => (
                  <HolidayRow
                    key={h.id}
                    kind="location"
                    name={h.name}
                    when={h.when}
                    recurrence={h.recurrence || "Yearly"}
                    dest={h.destination || "Holiday Greeting [2243]"}
                    onDelete={() => onDeleteLocation(h.id)}
                  />
                ))}
                <div className="pt-1">
                  <button type="button" className={outlineBtn} onClick={onAddLocation}>
                    <Icon name="plus" size={14} />
                    Location holiday
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      /* =====================================================
       *  MINI CALENDAR (multi-select)
       * ===================================================== */
      const MiniCalendar = ({ selected, onChange, onClose, onClear }) => {
        const today = new Date();
        const first = selected[0] ? new Date(selected[0]) : today;
        const [viewMonth, setViewMonth] = useState(first.getMonth()); // 0-11
        const [viewYear, setViewYear] = useState(first.getFullYear());
        const selectedSet = new Set(selected);
        const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
        const firstWeekday = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
        const prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();

        const cells = [];
        for (let i = 0; i < firstWeekday; i++) {
          cells.push({ date: null, day: prevMonthDays - firstWeekday + 1 + i, inMonth: false });
        }
        for (let d = 1; d <= daysInMonth; d++) {
          const iso = `${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          cells.push({ date: iso, day: d, inMonth: true });
        }
        while (cells.length < 42) {
          cells.push({ date: null, day: cells.length - firstWeekday - daysInMonth + 1, inMonth: false });
        }

        const prev = () => {
          if (viewMonth === 0) { setViewMonth(11); setViewYear((y) => y - 1); }
          else setViewMonth((m) => m - 1);
        };
        const next = () => {
          if (viewMonth === 11) { setViewMonth(0); setViewYear((y) => y + 1); }
          else setViewMonth((m) => m + 1);
        };

        const toggleDate = (iso) => {
          if (!iso) return;
          if (selectedSet.has(iso)) onChange(selected.filter((x) => x !== iso));
          else onChange([...selected, iso].sort());
        };

        const monthLabel = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][viewMonth];
        const weekdays = ["SU","MO","TU","WE","TH","FR","SA"];

        return (
          <div className="w-[326px] bg-white border border-ink-100 rounded-lg shadow-dropdown">
            <div className="flex items-center justify-between px-4 pt-4">
              <button type="button" onClick={prev} className="w-6 h-6 inline-flex items-center justify-center rounded hover:bg-ink-50">
                <Icon name="chevron-left" size={20} className="text-ink-700" />
              </button>
              <div className="text-[14px] font-semibold text-ink-900">{monthLabel} {viewYear}</div>
              <button type="button" onClick={next} className="w-6 h-6 inline-flex items-center justify-center rounded hover:bg-ink-50">
                <Icon name="chevron-right" size={20} className="text-ink-700" />
              </button>
            </div>
            <div className="px-4 pt-4 pb-2">
              <div className="grid grid-cols-7 gap-x-[21px] gap-y-3 text-center">
                {weekdays.map((w) => (
                  <div key={w} className="text-[10px] text-ink-500 font-semibold tracking-[0.1em]">{w}</div>
                ))}
                {cells.map((c, i) => {
                  const isSelected = c.date && selectedSet.has(c.date);
                  if (!c.inMonth) return <div key={i} className="h-6 w-6" />;
                  return (
                    <button
                      key={i}
                      type="button"
                      onClick={() => toggleDate(c.date)}
                      className={`h-6 w-6 mx-auto inline-flex items-center justify-center rounded text-[14px] leading-5 transition-colors ${isSelected ? "bg-primary-500 text-white font-semibold" : "text-ink-900 hover:bg-ink-50"}`}
                    >
                      {c.day}
                    </button>
                  );
                })}
              </div>
            </div>
            <div className="border-t border-ink-100 flex items-center justify-end gap-2 px-4 py-3">
              <button type="button" onClick={onClear} className="h-6 px-2 text-[12px] font-bold uppercase tracking-btnSm text-primary-500 hover:bg-primary-25 rounded">Clear</button>
              <button type="button" onClick={onClose} className="h-6 px-2 text-[12px] font-bold uppercase tracking-btnSm bg-primary-500 text-white hover:bg-primary-focused rounded">Save</button>
            </div>
          </div>
        );
      };

      /* =====================================================
       *  DATES PICKER (portal popup wrapping MiniCalendar)
       * ===================================================== */
      const DatesPicker = ({ label, dates, setDates, open, setOpen }) => {
        const [pos, setPos] = useState({ top: 0, left: 0, width: 0 });
        const wrapRef = useRef(null);
        const btnRef = useRef(null);
        const menuRef = useRef(null);
        const updatePos = () => {
          if (!btnRef.current) return;
          const r = btnRef.current.getBoundingClientRect();
          setPos({ top: r.bottom + 4, left: r.left, width: r.width });
        };
        useEffect(() => {
          if (!open) return;
          updatePos();
          const onDoc = (e) => {
            if (wrapRef.current && wrapRef.current.contains(e.target)) return;
            if (menuRef.current && menuRef.current.contains(e.target)) return;
            setOpen(false);
          };
          const onScroll = () => updatePos();
          document.addEventListener("mousedown", onDoc);
          window.addEventListener("scroll", onScroll, true);
          window.addEventListener("resize", onScroll);
          return () => {
            document.removeEventListener("mousedown", onDoc);
            window.removeEventListener("scroll", onScroll, true);
            window.removeEventListener("resize", onScroll);
          };
        }, [open]);
        const hasMany = dates.length > 1;
        return (
          <div className="flex flex-col gap-1" ref={wrapRef}>
            <label className="text-[14px] font-semibold leading-5 tracking-[0.018em] text-ink-700">{label}</label>
            <div
              ref={btnRef}
              className="relative w-full h-8 pl-3 pr-9 bg-white border border-ink-200 rounded hover:border-ink-400 focus-within:border-primary-500 cursor-pointer flex items-center gap-[2px]"
              onClick={() => setOpen((x) => !x)}
            >
              {dates.length === 0 ? (
                <span className="text-ink-400 text-[14px] leading-5">YYYY-MM-DD</span>
              ) : (
                <>
                  <span className="text-ink-900 text-[14px] leading-5">{dates[0]}</span>
                  {hasMany && (
                    <span onClick={(e) => e.stopPropagation()}>
                      <MorePill count={dates.length - 1} tooltipLines={dates} />
                    </span>
                  )}
                </>
              )}
              <Icon name="calendar-today" size={16} className="absolute right-3 top-1/2 -translate-y-1/2 text-ink-600" />
            </div>
            {open && ReactDOM.createPortal(
              <div
                ref={menuRef}
                className="fixed z-[9999]"
                style={{ top: pos.top, left: pos.left }}
              >
                <MiniCalendar
                  selected={dates}
                  onChange={setDates}
                  onClose={() => setOpen(false)}
                  onClear={() => setDates([])}
                />
              </div>,
              document.body
            )}
          </div>
        );
      };

      /* =====================================================
       *  CUSTOM HOLIDAY MODAL
       * ===================================================== */
      const occurrenceOptions = [
        { value: "first",  label: "First"  },
        { value: "second", label: "Second" },
        { value: "third",  label: "Third"  },
        { value: "fourth", label: "Fourth" },
        { value: "last",   label: "Last"   },
      ];
      const weekdayOptions = [
        "Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday",
      ].map((d) => ({ value: d, label: d }));

      const formatIsoShort = (iso) => {
        const [y, m, d] = iso.split("-");
        return `${y}-${m}-${d}`;
      };

      const CustomHolidayModal = ({ open, onClose, editing, onSave, title = "Custom Holiday", inlineDestination = false }) => {
        const [name, setName] = useState("");
        const [eventType, setEventType] = useState("yearly");
        const [dateConfig, setDateConfig] = useState("fixed");
        const [month, setMonth] = useState("");
        const [day, setDay] = useState(1);
        const [observeWeekday, setObserveWeekday] = useState(true);
        const [occurrence, setOccurrence] = useState("");
        const [movableDay, setMovableDay] = useState("");
        const [dates, setDates] = useState([]);
        const [calOpen, setCalOpen] = useState(false);
        const [timeConfig, setTimeConfig] = useState("allday");
        const [slots, setSlots] = useState([{ id: "s1", start: "09:00 AM", end: "05:00 PM" }]);
        const [destination, setDestination] = useState("");
        const [confirmOpen, setConfirmOpen] = useState(false);
        // Snapshot of opening values, used to disable Save until something changes.
        const initialRef = useRef(null);

        useEffect(() => {
          if (!open) return;
          const init = editing
            ? {
                name: editing.name ?? "",
                eventType: editing.recurrence ?? "yearly",
                dateConfig: editing.dateConfig ?? "fixed",
                month: editing.month ?? "",
                day: Number(editing.day) || 1,
                observeWeekday: editing.observeWeekday ?? true,
                occurrence: editing.occurrence ?? "",
                movableDay: editing.movableDay ?? "",
                dates: editing.dates ?? [],
                timeConfig: editing.timeConfig ?? "allday",
                slots: editing.slots && editing.slots.length ? editing.slots : [{ id: "s1", start: "09:00 AM", end: "05:00 PM" }],
                destination: editing.destValue ?? "",
              }
            : {
                name: "", eventType: "yearly", dateConfig: "fixed",
                month: "", day: 1, observeWeekday: true,
                occurrence: "", movableDay: "", dates: [],
                timeConfig: "allday", slots: [{ id: "s1", start: "09:00 AM", end: "05:00 PM" }],
                destination: "",
              };
          initialRef.current = init;
          setName(init.name);
          setEventType(init.eventType);
          setDateConfig(init.dateConfig);
          setMonth(init.month);
          setDay(init.day);
          setObserveWeekday(init.observeWeekday);
          setOccurrence(init.occurrence);
          setMovableDay(init.movableDay);
          setDates(init.dates);
          setTimeConfig(init.timeConfig);
          setSlots(init.slots);
          setDestination(init.destination);
          setCalOpen(false);
          setConfirmOpen(false);
        }, [open, editing]);

        const isOneTime = eventType === "one-time";
        const isFixed = dateConfig === "fixed";
        const isMovable = dateConfig === "movable";
        const isRange = timeConfig === "range";

        const dateFieldLabel = isOneTime ? "Date(s)" : "Date";
        const dateConfigLeftLabel = isOneTime ? "Fixed date(s)" : "Fixed date";

        // Validation
        let datesOk = true;
        if (isFixed && isOneTime) datesOk = dates.length > 0;
        if (isFixed && !isOneTime) datesOk = Boolean(month && day);
        if (isMovable) datesOk = Boolean(occurrence && movableDay && month);
        const slotsOk = !isRange || (
          slots.length > 0 &&
          slots.every((s) => s.start && s.end && parseTimeToMinutes(s.start) < parseTimeToMinutes(s.end))
        );
        const validOk = Boolean(name.trim() && destination && datesOk && slotsOk);
        const currentSnap = { name, eventType, dateConfig, month, day, observeWeekday, occurrence, movableDay, dates, timeConfig, slots, destination };
        const dirty = initialRef.current ? JSON.stringify(currentSnap) !== JSON.stringify(initialRef.current) : false;
        const canSave = validOk && dirty;

        const addSlot = () => {
          const id = `s-${Date.now()}`;
          setSlots((xs) => [...xs, { id, start: "09:00 AM", end: "05:00 PM" }]);
        };
        const removeSlot = (id) => setSlots((xs) => xs.filter((s) => s.id !== id));
        const updateSlot = (id, patch) => setSlots((xs) => xs.map((s) => (s.id === id ? { ...s, ...patch } : s)));

        const datesDisplay = () => {
          if (!dates.length) return "";
          const first = formatIsoShort(dates[0]);
          if (dates.length === 1) return first;
          return `${first}   +${dates.length - 1} more`;
        };

        const handleSave = () => {
          if (!canSave) return;
          const destLabel = destinationOptions.find((o) => o.value === destination)?.label ?? "";
          const monthLabel = monthOptions[parseInt(month,10)-1]?.label || "";
          let when = "";
          if (isOneTime && isFixed) {
            const first = dates[0] ? formatIsoShort(dates[0]) : "";
            const more = dates.length > 1 ? ` +${dates.length - 1} more` : "";
            const slotSuffix = isRange ? ` • ${slots.map((s) => `${s.start} - ${s.end}`).join(", ")}` : " • All day";
            when = `${first}${more}${slotSuffix}`;
          } else if (isMovable) {
            const occLabel = occurrenceOptions.find((o) => o.value === occurrence)?.label || "First";
            const slotStr = isRange ? slots.map((s) => `${s.start} - ${s.end}`).join(", ") : "All day";
            when = `${occLabel} ${movableDay} of ${monthLabel} • ${slotStr}`;
          } else {
            const slotStr = isRange ? slots.map((s) => `${s.start} - ${s.end}`).join(", ") : "All day";
            when = `${monthLabel} ${day} • ${slotStr}`;
          }
          const tooltip = buildHolidayTooltip({
            recurrence: eventType,
            month: monthLabel,
            day,
            timeConfig,
            timeStart: slots[0]?.start || "9:00 AM",
            timeEnd: slots[0]?.end || "5:00 PM",
          });
          onSave({
            id: editing?.id,
            name,
            recurrence: eventType,
            dateConfig,
            month, day,
            observeWeekday,
            occurrence, movableDay,
            dates,
            timeConfig,
            slots,
            when,
            tooltip,
            dest: destLabel,
            destValue: destination,
          });
        };

        // Number stepper for Date field
        const dayMax = [31,29,31,30,31,30,31,31,30,31,30,31][parseInt(month,10)-1] || 31;
        const clamp = (n) => Math.max(1, Math.min(dayMax, n));

        // Wraps onClose to prompt before discarding unsaved changes.
        const requestClose = () => {
          if (!dirty) { onClose?.(); return; }
          setConfirmOpen(true);
        };

        return (
          <>
          <Modal
            open={open}
            onClose={requestClose}
            title={title}
            width={524}
            outerHeight={700}
            footer={
              <>
                <Button variant="secondary" onClick={requestClose}>Cancel</Button>
                <Button variant="primary" onClick={handleSave} disabled={!canSave}>Save</Button>
              </>
            }
          >
            <div className="flex flex-col gap-5 py-4">
              {inlineDestination ? (
                <div className="grid grid-cols-2 gap-4">
                  <Input label="Holiday name" required value={name} onChange={setName} placeholder="e.g. Christmas" />
                  <Select
                    label="Destination"
                    required
                    value={destination}
                    onChange={setDestination}
                    options={destinationOptions}
                    placeholder="Select destination…"
                  />
                </div>
              ) : (
                <Input label="Holiday name" required value={name} onChange={setName} placeholder="e.g. Christmas" />
              )}

              <div className="flex flex-col gap-2">
                <div className="text-[14px] font-semibold text-ink-700">Event type</div>
                <div className="flex items-center gap-6">
                  <Radio name="event-type" value="yearly"   checked={eventType === "yearly"}   onChange={(v) => setEventType(v)} label="Recurring annually" />
                  <Radio name="event-type" value="one-time" checked={eventType === "one-time"} onChange={(v) => { setEventType(v); if (dateConfig === "movable") setDateConfig("fixed"); }} label="One-time event" />
                </div>
              </div>

              <div className="flex flex-col gap-2">
                <div className="text-[14px] font-semibold text-ink-700">Date configuration</div>
                <div className="flex items-center gap-6">
                  <Radio name="date-config" value="fixed"   checked={isFixed}   onChange={setDateConfig} label={dateConfigLeftLabel} />
                  <Radio name="date-config" value="movable" checked={isMovable} onChange={setDateConfig} label="Movable date" disabled={isOneTime} />
                </div>
              </div>

              <hr className="border-ink-100" />

              {/* Date specifics */}
              {isFixed && !isOneTime && (
                <>
                  <div className="grid grid-cols-[1fr_96px] gap-4">
                    <Select label="Month" value={month} onChange={setMonth} options={monthOptions} placeholder="Select month" />
                    <div className="flex flex-col gap-1">
                      <label className="text-[14px] font-semibold leading-5 tracking-[0.018em] text-ink-700">Date</label>
                      <div className="relative w-full h-8 flex items-center border border-ink-200 rounded bg-white">
                        <input
                          type="text"
                          value={String(day)}
                          onChange={(e) => {
                            const n = parseInt(e.target.value, 10);
                            if (!Number.isNaN(n)) setDay(clamp(n));
                            else if (e.target.value === "") setDay("");
                          }}
                          className="w-full h-full pl-3 pr-6 text-[14px] leading-5 text-ink-900 bg-transparent focus:outline-none"
                        />
                        <div className="absolute right-1 top-1/2 -translate-y-1/2 flex flex-col">
                          <button type="button" onClick={() => setDay(clamp((Number(day) || 0) + 1))} className="h-3 w-4 inline-flex items-center justify-center text-ink-600 hover:text-primary-500">
                            <svg width="8" height="5" viewBox="0 0 8 5" fill="none"><path d="M4 0L0 4L1 5L4 2L7 5L8 4L4 0Z" fill="currentColor"/></svg>
                          </button>
                          <button type="button" onClick={() => setDay(clamp((Number(day) || 0) - 1))} className="h-3 w-4 inline-flex items-center justify-center text-ink-600 hover:text-primary-500">
                            <svg width="8" height="5" viewBox="0 0 8 5" fill="none"><path d="M4 5L0 1L1 0L4 3L7 0L8 1L4 5Z" fill="currentColor"/></svg>
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                  <Checkbox
                    checked={observeWeekday}
                    onChange={setObserveWeekday}
                    label="Observe on nearest weekday if it falls on a weekend"
                    description={"The holiday falls on Saturday, it will be observed on Friday\nIf it falls on Sunday, it will be observed on Monday"}
                  />
                </>
              )}

              {isFixed && isOneTime && (
                <DatesPicker
                  label={dateFieldLabel}
                  dates={dates}
                  setDates={setDates}
                  open={calOpen}
                  setOpen={setCalOpen}
                  display={datesDisplay()}
                />
              )}

              {isMovable && (
                <div className="grid grid-cols-3 gap-3">
                  <Select label="Occurrence" value={occurrence} onChange={setOccurrence} options={occurrenceOptions} placeholder="Select" />
                  <Select label="Day" value={movableDay} onChange={setMovableDay} options={weekdayOptions} placeholder="Select" />
                  <Select label="Month" value={month} onChange={setMonth} options={monthOptions} placeholder="Select" />
                </div>
              )}

              <hr className="border-ink-100" />

              <div className="flex flex-col gap-2">
                <div className="text-[14px] font-semibold text-ink-700">Time configuration</div>
                <div className="flex flex-col gap-2">
                  <Radio name="time-config" value="allday" checked={!isRange} onChange={setTimeConfig} label="All day" />
                  <Radio name="time-config" value="range"  checked={isRange}  onChange={setTimeConfig} label="Specific time ranges" />
                </div>
                {isRange && (
                  <div className="flex flex-col gap-2 pt-2">
                    {slots.map((s, idx) => {
                      const slotHasStart = !!(s.start && String(s.start).trim());
                      const slotHasEnd = !!(s.end && String(s.end).trim());
                      const slotRangeValid = slotHasStart && slotHasEnd
                        ? parseTimeToMinutes(s.start) < parseTimeToMinutes(s.end)
                        : true;
                      const slotErr = slotHasStart && slotHasEnd && !slotRangeValid;
                      return (
                        <div key={s.id} className="flex flex-col gap-2 rounded border border-ink-100 bg-ink-50/60 px-3 py-2">
                          <div className="flex items-center justify-between">
                            <span className="text-[14px] font-semibold text-ink-900">Slot {idx + 1}</span>
                            <IconButton name="trash" title="Remove" onClick={() => removeSlot(s.id)} />
                          </div>
                          <div className="grid grid-cols-2 gap-3">
                            <TimePickerInput label="Start time" value={s.start} error={slotErr}
                              onChange={(v) => updateSlot(s.id, { start: v })} />
                            <TimePickerInput label="End time"   value={s.end}   error={slotErr}
                              onChange={(v) => updateSlot(s.id, { end: v })} />
                          </div>
                          {slotErr && (
                            <div className="flex items-center gap-1 text-[12px] leading-4 text-[#B3261E]">
                              <Icon name="warning-circle" size={14} className="text-[#B3261E]" />
                              <span>Start time must be before end time.</span>
                            </div>
                          )}
                        </div>
                      );
                    })}
                    <div>
                      <button type="button" onClick={addSlot}
                        className="inline-flex items-center gap-1 h-6 pl-1 pr-2 rounded bg-white border border-[#A3B6D7] text-[#244C91] text-[12px] font-bold uppercase tracking-btnSm hover:bg-[#D1DAEB] transition-colors">
                        <Icon name="plus" size={14} />
                        Time slot
                      </button>
                    </div>
                  </div>
                )}
              </div>

              {!inlineDestination && (
                <>
                  <hr className="border-ink-100" />

                  <Select
                    label="Destination"
                    required
                    value={destination}
                    onChange={setDestination}
                    options={destinationOptions}
                    placeholder="Select destination…"
                  />
                </>
              )}
            </div>
          </Modal>
          <UnsavedChangesDialog
            open={confirmOpen}
            canSave={!!canSave}
            onCancel={() => setConfirmOpen(false)}
            onDiscard={() => { setConfirmOpen(false); onClose?.(); }}
            onSaveExit={() => { setConfirmOpen(false); handleSave(); }}
          />
          </>
        );
      };

      /* =====================================================
       *  LOCATION HOLIDAY MODAL (checklist)
       * ===================================================== */
      const LocationHolidayModal = ({ open, onClose, selectedIds, onSave, catalog = locationHolidayCatalog }) => {
        const [selected, setSelected] = useState(selectedIds);
        const [confirmOpen, setConfirmOpen] = useState(false);
        const initialRef = useRef(null);
        useEffect(() => {
          if (open) {
            const init = [...(selectedIds || [])];
            initialRef.current = init;
            setSelected(init);
            setConfirmOpen(false);
          }
        }, [open, selectedIds]);
        const toggle = (id) => setSelected((s) => (s.includes(id) ? s.filter((x) => x !== id) : [...s, id]));
        const initSorted = initialRef.current ? [...initialRef.current].sort() : null;
        const curSorted = [...selected].sort();
        const dirty = initSorted ? JSON.stringify(initSorted) !== JSON.stringify(curSorted) : false;
        const requestClose = () => {
          if (!dirty) { onClose?.(); return; }
          setConfirmOpen(true);
        };
        return (
          <>
          <Modal
            open={open}
            onClose={requestClose}
            title="Location Holiday"
            width={449}
            footer={
              <>
                <Button variant="secondary" onClick={requestClose}>Cancel</Button>
                <Button variant="primary" onClick={() => onSave(selected)} disabled={!dirty}>Save</Button>
              </>
            }
          >
            <div className="flex flex-col gap-3 py-4">
              {catalog.map((h) => (
                <label key={h.id} className="flex items-center gap-3 cursor-pointer h-6">
                  <span className="relative w-5 h-5 shrink-0">
                    <input
                      type="checkbox"
                      checked={selected.includes(h.id)}
                      onChange={() => toggle(h.id)}
                      className="peer absolute inset-0 w-5 h-5 opacity-0 cursor-pointer"
                    />
                    <span className="pointer-events-none absolute inset-0 rounded-[4px] border-2 border-ink-500 peer-checked:border-primary-500 peer-checked:bg-primary-500 transition-colors" />
                    <svg
                      viewBox="0 0 24 24"
                      className="pointer-events-none absolute inset-0 w-full h-full opacity-0 peer-checked:opacity-100"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M10.7092 15.8329C10.6576 15.833 10.6065 15.8227 10.559 15.8028C10.5114 15.7829 10.4683 15.7537 10.4322 15.7169L7.84716 13.1369C7.77369 13.0634 7.73242 12.9638 7.73242 12.8599C7.73242 12.756 7.77369 12.6564 7.84716 12.5829C7.92062 12.5094 8.02026 12.4682 8.12416 12.4682C8.22805 12.4682 8.32769 12.5094 8.40116 12.5829L10.6712 14.8529L15.5712 8.32091C15.6005 8.27727 15.6385 8.24007 15.6827 8.21156C15.7269 8.18305 15.7765 8.16383 15.8284 8.15507C15.8802 8.14631 15.9334 8.1482 15.9845 8.16061C16.0356 8.17301 16.0837 8.19569 16.1258 8.22726C16.1679 8.25882 16.2031 8.29862 16.2293 8.34423C16.2555 8.38984 16.2722 8.4403 16.2783 8.49255C16.2845 8.54481 16.2799 8.59776 16.2649 8.64819C16.2499 8.69862 16.2248 8.74548 16.1912 8.78591L11.0192 15.6779C10.986 15.7225 10.9437 15.7594 10.895 15.7861C10.8464 15.8129 10.7925 15.8288 10.7372 15.8329H10.7092Z"
                        fill="white"
                        stroke="white"
                      />
                    </svg>
                  </span>
                  <span className="text-[14px] text-ink-900 font-semibold">{h.name}</span>
                  <span className="text-[14px] text-ink-600">{h.when}</span>
                </label>
              ))}
            </div>
          </Modal>
          <UnsavedChangesDialog
            open={confirmOpen}
            canSave={!!dirty}
            onCancel={() => setConfirmOpen(false)}
            onDiscard={() => { setConfirmOpen(false); onClose?.(); }}
            onSaveExit={() => { setConfirmOpen(false); onSave(selected); }}
          />
          </>
        );
      };

      /* =====================================================
       *  TOAST
       * ===================================================== */
      const Toast = ({ msg, type }) => (
        // Positioned below the stacked page headers (TopNav 60px + Breadcrumb
        // 32px + CustomerBar 44px = 136px) with a 16px gap, horizontally
        // centered on the screen. No fade animation — appears and disappears
        // instantly.
        <div className="fixed top-[152px] left-1/2 -translate-x-1/2 z-[60] bg-ink-900 text-white rounded shadow-dropdown px-4 h-10 flex items-center gap-2">
          <Icon name={type === "success" ? "check" : "info"} size={16} />
          <span className="text-[14px]">{msg}</span>
        </div>
      );

      /* =====================================================
       *  RENDER
       * ===================================================== */
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
