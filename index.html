      /* Pagination page-size / jump-to-page selects: hide native arrow, draw a
         chevron-down 8px in from the right edge (so there's 8px of padding
         after the arrow). Width is driven by the hidden sizer sibling in
         .bvp-select-sizer so it tracks the current value, not the widest
         option. */
      .bvp-page-select {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%234C5863' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
        background-repeat: no-repeat;
        background-position: right 8px center;
        padding-right: 32px;
        width: auto;
        min-width: 0;
      }
      /* Inline wrapper that sizes to the currently selected value by using
         a hidden, text-only "ghost" sibling with the same font metrics and
         horizontal padding as the select. The <select> is absolutely
         positioned on top and stretches to fill the wrapper. */
      .bvp-page-select-wrap {
        position: relative;
        display: inline-block;
        vertical-align: middle;
      }
      .bvp-page-select-wrap > .bvp-select-sizer {
        display: block;
        visibility: hidden;
        pointer-events: none;
        white-space: nowrap;
        font-size: 14px;
        line-height: 32px;   /* matches h-8 */
        height: 32px;
        padding-left: 8px;   /* matches px-2 */
        padding-right: 32px; /* matches chevron reserve */
        border: 1px solid transparent; /* matches select border width */
        box-sizing: border-box;
      }
      .bvp-page-select-wrap > select.bvp-page-select {
        position: absolute;
        inset: 0;
        width: 100%;
      }
    </style>

      // Primary button, uppercase + letterSpacing per Figma "Button Medium" token
      const Button = ({
        variant = "primary", size = "md", disabled, onClick, children, className = "", iconLeft, iconRight, type = "button",
      }) => {
        const base = "inline-flex items-center justify-center gap-2 rounded font-bold uppercase tracking-btn select-none transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary-500 focus-visible:ring-offset-1";
        const sizes = {
          sm: "h-6 px-2 text-[12px] leading-4 tracking-btnSm",
          md: "h-9 px-3 text-[14px] leading-4",
          lg: "h-10 px-4 text-[14px] leading-4",
        };
        const variants = {
          primary: "bg-primary-500 text-white hover:bg-primary-focused active:bg-primary-700 disabled:bg-[#E5E6E8] disabled:text-[#4C5863]",
          secondary: "bg-white text-primary-500 border border-[#A3B6D7] hover:bg-primary-25 active:bg-primary-50 disabled:bg-[#E5E6E8] disabled:border-[#E5E6E8] disabled:text-[#4C5863]",
          ghost: "bg-transparent text-primary-500 hover:bg-primary-25 active:bg-primary-50 disabled:bg-[#E5E6E8] disabled:text-[#4C5863]",
          danger: "bg-white text-ink-600 hover:bg-ink-50 disabled:bg-[#E5E6E8] disabled:text-[#4C5863]",
        };
        return (
          <button type={type} onClick={onClick} disabled={disabled}
            className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>
            {iconLeft && <Icon name={iconLeft} size={size === "sm" ? 14 : 18} />}
            <span>{children}</span>
            {iconRight && <Icon name={iconRight} size={size === "sm" ? 14 : 18} />}
          </button>
        );
      };

      // Icon-only action button (e.g. edit/copy/delete row)
      const IconButton = ({ name, onClick, title, size = 18, className = "", disabled = false }) => (
        <button
          type="button"
          onClick={disabled ? undefined : onClick}
          title={disabled ? undefined : title}
          aria-label={title}
          aria-disabled={disabled || undefined}
          disabled={disabled}
          className={`inline-flex items-center justify-center w-[26px] h-[26px] rounded transition-colors bvp-focus ${
            disabled
              ? "text-ink-300 cursor-not-allowed"
              : "text-ink-700 hover:bg-ink-50 hover:text-primary-500"
          } ${className}`}
        >
          <Icon name={name} size={size} />
        </button>
      );

      // Portal-based tooltip — escapes overflow:hidden ancestors and always sits on top.
      const PortalTooltip = ({ text, children, className = "" }) => {
        const [visible, setVisible] = useState(false);
        const [pos, setPos] = useState({ top: 0, left: 0 });
        const ref = useRef(null);
        const update = () => {
          if (!ref.current) return;
          const r = ref.current.getBoundingClientRect();
          setPos({ top: r.top, left: r.left + r.width / 2 });
        };
        const onEnter = () => { update(); setVisible(true); };
        const onLeave = () => setVisible(false);
        return (
          <>
            <span
              ref={ref}
              onMouseEnter={onEnter}
              onMouseLeave={onLeave}
              className={`inline-flex ${className}`}
            >
              {children}
            </span>
            {visible && ReactDOM.createPortal(
              <div
                className="fixed z-[9999] pointer-events-none max-w-[280px] whitespace-normal break-words bg-ink-900 text-white text-[12px] leading-4 px-2 py-1 rounded"
                style={{ top: pos.top - 8, left: pos.left, transform: "translate(-50%, -100%)" }}
              >
                {text}
                <span className="absolute left-1/2 -translate-x-1/2 top-full -mt-px w-0 h-0 border-x-[5px] border-x-transparent border-t-[5px] border-t-ink-900" />
              </div>,
              document.body
            )}
          </>
        );
      };

      // Tooltip variant that only shows when the inner text is actually truncated
      // (i.e. scrollWidth > clientWidth). Wraps a single text child and renders it
      // with the standard truncate classes applied to a child span. Optionally a
      // `display` JSX can be passed to render something different (e.g. a
      // highlighted version of the text) while keeping the plain tooltip string.
      // `force` always shows the tooltip on hover — useful when the displayed
      // content is logically truncated (e.g. "A, B, …") but still fits in the
      // cell so CSS-based detection would miss it.
      const TruncationTooltip = ({ text, display, className = "", innerClassName = "", force = false }) => {
        const [visible, setVisible] = useState(false);
        const [pos, setPos] = useState({ top: 0, left: 0 });
        const wrapRef = useRef(null);
        const textRef = useRef(null);
        const isTruncated = () => {
          if (force) return true;
          const el = textRef.current;
          if (!el) return false;
          return el.scrollWidth > el.clientWidth + 1;
        };
        const onEnter = () => {
          if (!isTruncated()) return;
          if (wrapRef.current) {
            const r = wrapRef.current.getBoundingClientRect();
            setPos({ top: r.top, left: r.left + r.width / 2 });
          }
          setVisible(true);
        };
        const onLeave = () => setVisible(false);
        return (
          <>
            <span
              ref={wrapRef}
              onMouseEnter={onEnter}
              onMouseLeave={onLeave}
              className={`inline-flex min-w-0 ${className}`}
            >
              <span
                ref={textRef}
                className={`truncate block min-w-0 w-full ${innerClassName}`}
              >
                {display ?? text}
              </span>
            </span>
            {visible && ReactDOM.createPortal(
              <div
                className="fixed z-[9999] pointer-events-none max-w-[280px] whitespace-normal break-words bg-ink-900 text-white text-[12px] leading-4 px-2 py-1 rounded"
                style={{ top: pos.top - 8, left: pos.left, transform: "translate(-50%, -100%)" }}
              >
                {text}
                <span className="absolute left-1/2 -translate-x-1/2 top-full -mt-px w-0 h-0 border-x-[5px] border-x-transparent border-t-[5px] border-t-ink-900" />
              </div>,
              document.body
            )}
          </>
        );
      };

      // Text input (floating label style matches Figma Input component)
      const Input = ({ label, value, onChange, placeholder, required, assistive, className = "", disabled, error = false }) => (
        <div className={`flex flex-col gap-1 ${className}`}>
          {label && (
            <label className="text-[14px] font-semibold leading-5 tracking-[0.018em] text-ink-700 flex gap-0.5">
              <span>{label}</span>
              {required && <span className="text-[#D23C4A]">*</span>}
            </label>
          )}
          <input
            type="text"
            value={value ?? ""}
            onChange={(e) => onChange?.(e.target.value)}
            placeholder={placeholder}
            disabled={disabled}
            className={`h-8 px-3 py-1.5 text-[14px] leading-5 tracking-[0.018em] text-ink-900 bg-white border rounded focus:outline-none focus:ring-0 disabled:bg-ink-50 disabled:text-ink-400 placeholder:text-ink-400 ${
              error
                ? "border-[#B3261E] hover:border-[#B3261E] focus:border-[#B3261E]"
                : "border-ink-200 hover:border-ink-400 focus:border-primary-500"
            }`}
          />
          {assistive && <div className="text-[12px] leading-4 text-ink-500">{assistive}</div>}
        </div>
      );

      // Select dropdown (renders its menu via portal so it escapes any overflow:hidden/auto ancestors)
      const Select = ({ label, value, onChange, options, placeholder, required, className = "", disabled, dirty, error = false }) => {
        const [open, setOpen] = useState(false);
        const [search, setSearch] = useState("");
        const [pos, setPos] = useState({ top: 0, left: 0, width: 0 });
        const wrapRef = useRef(null);
        const btnRef = useRef(null);
        const menuRef = useRef(null);
        const inputRef = useRef(null);
        const updatePos = () => {
          if (!btnRef.current) return;
          const r = btnRef.current.getBoundingClientRect();
          setPos({ top: r.bottom + 4, left: r.left, width: r.width });
        };
        useEffect(() => {
          if (!open) return;
          updatePos();
          // Reset the search query each time the dropdown opens, and focus
          // the embedded input so the user can immediately type to filter.
          setSearch("");
          requestAnimationFrame(() => inputRef.current?.focus());
          const onDoc = (e) => {
            if (wrapRef.current && wrapRef.current.contains(e.target)) return;
            if (menuRef.current && menuRef.current.contains(e.target)) return;
            setOpen(false);
          };
          const onScroll = () => updatePos();
          document.addEventListener("mousedown", onDoc);
          window.addEventListener("scroll", onScroll, true);
          window.addEventListener("resize", onScroll);
          return () => {
            document.removeEventListener("mousedown", onDoc);
            window.removeEventListener("scroll", onScroll, true);
            window.removeEventListener("resize", onScroll);
          };
        }, [open]);
        const selectedOption = options.find((o) => o.value === value);
        const selectedLabel = selectedOption?.label ?? placeholder ?? "Select…";
        const q = search.trim().toLowerCase();
        const filteredOptions = q
          ? options.filter((o) => (o.label || "").toLowerCase().includes(q))
          : options;
        return (
          <div className={`flex flex-col gap-1 ${className}`} ref={wrapRef}>
            {label && (
              <label className="text-[14px] font-semibold leading-5 tracking-[0.018em] text-ink-700 flex gap-0.5">
                <span>{label}</span>
                {required && <span className="text-[#D23C4A]">*</span>}
              </label>
            )}
            <div
              ref={btnRef}
              className={`relative h-8 bg-white border rounded ${
                error
                  ? "border-[#B3261E]"
                  : dirty
                    ? "border-ink-500"
                    : "border-ink-200"
              } ${disabled ? "bg-ink-50" : error ? "hover:border-[#B3261E] focus-within:border-[#B3261E]" : "hover:border-ink-400 focus-within:border-primary-500"}`}
            >
              {open ? (
                <input
                  ref={inputRef}
                  type="text"
                  value={search}
                  placeholder={selectedLabel}
                  onChange={(e) => setSearch(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Escape") { e.preventDefault(); setOpen(false); } }}
                  className="w-full h-full pl-3 pr-8 bg-transparent text-[14px] leading-5 tracking-[0.018em] text-ink-900 placeholder:text-ink-400 focus:outline-none rounded"
                />
              ) : (
                <button
                  type="button"
                  onClick={() => !disabled && setOpen(true)}
                  disabled={disabled}
                  className="w-full h-full pl-3 pr-8 text-left text-[14px] leading-5 tracking-[0.018em] text-ink-900 disabled:text-ink-400 focus:outline-none rounded"
                >
                  <span className={selectedOption ? "" : "text-ink-400"}>{selectedLabel}</span>
                </button>
              )}
              <button
                type="button"
                tabIndex={-1}
                aria-label={open ? "Close dropdown" : "Open dropdown"}
                onMouseDown={(e) => { e.preventDefault(); }}
                onClick={() => { if (!disabled) setOpen((x) => !x); }}
                disabled={disabled}
                className="absolute right-2 top-1/2 -translate-y-1/2 inline-flex items-center justify-center text-ink-600 disabled:text-ink-400"
              >
                <Icon name={open ? "chevron-up" : "chevron-down"} size={16} />
              </button>
            </div>
            {open && ReactDOM.createPortal(
              <div
                ref={menuRef}
                className="fixed z-[9999] bg-white border border-ink-100 rounded shadow-dropdown py-1 max-h-60 overflow-auto bvp-scroll bvp-animate-in"
                style={{ top: pos.top, left: pos.left, width: pos.width }}
              >
                {filteredOptions.length === 0 ? (
                  <div className="px-3 py-1.5 text-[14px] leading-5 text-ink-400">No matches</div>
                ) : (() => {
                  // Render group headers when consecutive options have a
                  // different `group` value. Options without a group render
                  // exactly as before (no header).
                  let lastGroup = null;
                  const out = [];
                  filteredOptions.forEach((o, i) => {
                    if (o.group && o.group !== lastGroup) {
                      out.push(
                        <div
                          key={`__group_${o.group}_${i}`}
                          className={`px-3 pt-2 pb-1 text-[11px] leading-4 font-semibold uppercase tracking-[0.06em] text-ink-500 select-none ${lastGroup ? "border-t border-ink-100 mt-1" : ""}`}
                        >
                          {o.group}
                        </div>
                      );
                      lastGroup = o.group;
                    } else if (!o.group) {
                      lastGroup = null;
                    }
                    const isDisabled = !!o.disabled;
                    const label = <span>{highlightMatch(o.label, search)}</span>;
                    const labelNode = isDisabled && o.disabledTooltip
                      ? <PortalTooltip text={o.disabledTooltip}>{label}</PortalTooltip>
                      : label;
                    out.push(
                      <div
                        key={o.value}
                        onClick={() => { if (isDisabled) return; onChange?.(o.value); setOpen(false); }}
                        className={`px-3 py-1.5 text-[14px] leading-5 flex items-center gap-2 ${
                          isDisabled
                            ? "cursor-not-allowed text-ink-400"
                            : `cursor-pointer bvp-row-hover ${value === o.value ? "text-primary-500 font-semibold bg-primary-25" : "text-ink-900"}`
                        }`}
                      >
                        {labelNode}
                        {o.warning && !isDisabled && (
                          <PortalTooltip text={o.warning} className="group">
                            <Icon name="warning-circle" size={14} className="text-[#7F888F] group-hover:text-[#244C91] transition-colors" />
                          </PortalTooltip>
                        )}
                      </div>
                    );
                  });
                  return out;
                })()}
              </div>,
              document.body
            )}
          </div>
        );
      };

      // Radio
      const Radio = ({ checked, onChange, label, name, value, disabled }) => (
        <label className={`inline-flex items-center gap-2 select-none ${disabled ? "cursor-not-allowed" : "cursor-pointer"}`}>
          <input
            type="radio"
            checked={checked}
            disabled={disabled}
            onChange={() => !disabled && onChange?.(value)}
            name={name}
            className={`appearance-none w-[18px] h-[18px] rounded-full border-2 relative transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500 focus-visible:ring-offset-2
              checked:after:content-[''] checked:after:absolute checked:after:inset-[3px] checked:after:rounded-full
              ${disabled
                ? "border-[#CCCFD2] checked:border-[#CCCFD2] checked:after:bg-[#CCCFD2] cursor-not-allowed"
                : "border-ink-500 checked:border-primary-500 checked:after:bg-primary-500 cursor-pointer"}`}
          />
          <span className={`text-[14px] leading-5 tracking-[0.018em] ${disabled ? "text-ink-400" : "text-ink-900"}`}>{label}</span>
        </label>
      );

      // Checkbox
      const Checkbox = ({ checked, onChange, label, description }) => (
        <label className="inline-flex items-start gap-2 cursor-pointer select-none">
          <span className="relative w-5 h-5 mt-0.5 shrink-0">
            <input
              type="checkbox"
              checked={!!checked}
              onChange={(e) => onChange?.(e.target.checked)}
              className="peer absolute inset-0 w-5 h-5 opacity-0 cursor-pointer"
            />
            <span className="pointer-events-none absolute inset-0 rounded-[4px] border-2 border-ink-500 peer-checked:border-primary-500 peer-checked:bg-primary-500 transition-colors" />
            <svg
              viewBox="0 0 24 24"
              className="pointer-events-none absolute inset-0 w-full h-full opacity-0 peer-checked:opacity-100"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M10.7092 15.8329C10.6576 15.833 10.6065 15.8227 10.559 15.8028C10.5114 15.7829 10.4683 15.7537 10.4322 15.7169L7.84716 13.1369C7.77369 13.0634 7.73242 12.9638 7.73242 12.8599C7.73242 12.756 7.77369 12.6564 7.84716 12.5829C7.92062 12.5094 8.02026 12.4682 8.12416 12.4682C8.22805 12.4682 8.32769 12.5094 8.40116 12.5829L10.6712 14.8529L15.5712 8.32091C15.6005 8.27727 15.6385 8.24007 15.6827 8.21156C15.7269 8.18305 15.7765 8.16383 15.8284 8.15507C15.8802 8.14631 15.9334 8.1482 15.9845 8.16061C16.0356 8.17301 16.0837 8.19569 16.1258 8.22726C16.1679 8.25882 16.2031 8.29862 16.2293 8.34423C16.2555 8.38984 16.2722 8.4403 16.2783 8.49255C16.2845 8.54481 16.2799 8.59776 16.2649 8.64819C16.2499 8.69862 16.2248 8.74548 16.1912 8.78591L11.0192 15.6779C10.986 15.7225 10.9437 15.7594 10.895 15.7861C10.8464 15.8129 10.7925 15.8288 10.7372 15.8329H10.7092Z"
                fill="white"
                stroke="white"
              />
            </svg>
          </span>
          <span className="flex flex-col gap-1">
            <span className="text-[14px] leading-5 tracking-[0.018em] text-ink-900">{label}</span>
            {description && <span className="text-[12px] leading-4 text-ink-500">{description}</span>}
          </span>
        </label>
      );

      // Tag / Status label
      const Tag = ({ color = "neutral", icon, children }) => {
        const colors = {
          neutral: "bg-ink-50 text-ink-700",
          primary: "bg-primary-25 text-primary-500",
          success: "bg-success-50 text-success-700",
          warning: "bg-warning-50 text-ink-800",
        };
        return (
          <span className={`inline-flex items-center gap-1 h-5 px-2 rounded text-[10px] font-semibold uppercase tracking-[0.15em] ${colors[color]}`}>
            {icon && <Icon name={icon} size={12} />}
            {children}
          </span>
        );
      };

      // Modal scaffold
      const Modal = ({ open, onClose, title, width = 524, children, footer, size, outerHeight }) => {
        useEffect(() => {
          if (!open) return;
          const onKey = (e) => e.key === "Escape" && onClose?.();
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [open, onClose]);
        if (!open) return null;
        // outerHeight fixes the container's total height so the modal stays the same size
        // regardless of inner content. Body is flex-1 so header/footer always sit snugly.
        // max-h-[92vh] still caps the modal on small viewports, and flex-1 lets the body shrink.
        const containerStyle = { width, maxWidth: "95vw" };
        if (outerHeight) containerStyle.height = outerHeight;
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-ink-900/40" onClick={onClose}>
            <div
              className="bg-white rounded-lg shadow-dropdown flex flex-col max-h-[92vh] bvp-animate-in"
              style={containerStyle}
              onClick={(e) => e.stopPropagation()}
            >
              {/* Header */}
              <div className="flex items-center justify-between h-16 px-6 shrink-0 border-b border-ink-100">
                <h2 className="font-display text-[16px] font-semibold text-ink-900">{title}</h2>
                <IconButton name="close" title="Close" onClick={onClose} />
              </div>
              {/* Body */}
              <div className="flex-1 min-h-0 overflow-auto px-6 pb-2 bvp-scroll">{children}</div>
              {/* Footer */}
              {footer && (
                <div className="flex items-center justify-end gap-3 h-[68px] px-6 border-t border-ink-100 shrink-0">
                  {footer}
                </div>
              )}
            </div>
          </div>
        );
      };

      /* Confirmation dialog shown when the user tries to close a modal with
       * unsaved changes. Renders on top of the owning modal. Clicking the
       * backdrop dismisses the dialog and returns to the underlying modal.
       * There is intentionally no close (X) button. */
      const UnsavedChangesDialog = ({ open, canSave = true, onDiscard, onSaveExit, onCancel }) => {
        useEffect(() => {
          if (!open) return;
          const onKey = (e) => { if (e.key === "Escape") onCancel?.(); };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [open, onCancel]);
        if (!open) return null;
        return (
          <div
            className="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-ink-900/40"
            onClick={onCancel}
          >
            <div
              className="bg-white rounded-lg shadow-dropdown bvp-animate-in flex flex-col w-[440px] max-w-[95vw]"
              onClick={(e) => e.stopPropagation()}
            >
              <div className="flex items-center h-16 px-6 shrink-0 border-b border-ink-100">
                <h2 className="font-display text-[16px] font-semibold text-ink-900">Unsaved Changes</h2>
              </div>
              <div className="px-6 py-5 text-[14px] leading-5 text-ink-700">
                You have unsaved changes. Would you like to save before closing?
              </div>
              <div className="flex items-center justify-end gap-3 h-[68px] px-6 shrink-0 border-t border-ink-100">
                <button
                  type="button"
                  onClick={onDiscard}
                  className="inline-flex items-center justify-center h-9 px-3 rounded bg-white border border-[#C70816] text-[#C70816] text-[14px] leading-4 font-bold uppercase tracking-btn select-none transition-colors hover:bg-[#FDECEC] active:bg-[#FBD9D9] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#C70816] focus-visible:ring-offset-1"
                >
                  <span>Discard</span>
                </button>
                <Button variant="primary" onClick={onSaveExit} disabled={!canSave}>Save &amp; Exit</Button>
              </div>
            </div>
          </div>
        );
      };

      /* Confirmation dialog for destructive actions (deleting a scheduler,
       * a location holiday, or an away mode rule). Mirrors the look of the
       * Unsaved Changes dialog but with a solid red Delete button. */
      const ConfirmDeleteDialog = ({ open, title = "Delete", itemName = "", onCancel, onConfirm }) => {
        useEffect(() => {
          if (!open) return;
          const onKey = (e) => { if (e.key === "Escape") onCancel?.(); };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        }, [open, onCancel]);
        if (!open) return null;
        return (
          <div
            className="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-ink-900/40"
            onClick={onCancel}
          >
            <div
              className="bg-white rounded-lg shadow-dropdown bvp-animate-in flex flex-col w-[440px] max-w-[95vw]"
              onClick={(e) => e.stopPropagation()}
            >
              <div className="flex items-center h-16 px-6 shrink-0 border-b border-ink-100">
                <h2 className="font-display text-[16px] font-semibold text-ink-900">{title}</h2>
              </div>
              <div className="px-6 py-5 text-[14px] leading-5 text-ink-700">
                Delete {itemName ? <span className="font-semibold text-ink-900">{itemName}</span> : "this item"}? This action can’t be undone.
              </div>
              <div className="flex items-center justify-end gap-3 h-[68px] px-6 shrink-0 border-t border-ink-100">
                <Button variant="secondary" onClick={onCancel}>Cancel</Button>
                <button
                  type="button"
                  onClick={onConfirm}
                  className="inline-flex items-center justify-center h-9 px-3 rounded bg-[#C70816] border border-[#C70816] text-white text-[14px] leading-4 font-bold uppercase tracking-btn select-none transition-colors hover:bg-[#A90613] active:bg-[#8F0510] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#C70816] focus-visible:ring-offset-1"
                >
                  <span>Delete</span>
                </button>
              </div>
            </div>
          </div>
        );
      };

      /* =====================================================
       *  SEED DATA
       * ===================================================== */
      const seedSchedulers = [
        {
          id: "bh",
          name: "Business Hours",
          isDefault: true,
          assignedTo: "(805) 413-5803, (805) 413-6703",
          defaultRoute: "Ring All [8990]",
          awayRoute: "N/A",
          timeSlots: [
            { id: "ts1", days: "Monday - Friday", range: "9:00 AM - 1:00 PM", dest: "Main Reception [6678]" },
            { id: "ts2", days: "Saturday", range: "10:00 AM - 12:00 PM", dest: "Front Desk [3390]" },
          ],
          customHolidays: [
            {
              id: "h1",
              name: "Company Event",
              when: "2026-01-14 • 9:00 AM - 5:00 PM",
              dest: "Holiday Greeting [2243]",
              destValue: "holiday-2243",
              recurrence: "one-time",
              dateConfig: "fixed",

      const monthFullName = (m) => ["January","February","March","April","May","June","July","August","September","October","November","December"][parseInt(m, 10) - 1] || "";
      const ordinalNumber = (n) => {
        const v = parseInt(n, 10); if (isNaN(v)) return "";
        const s = ["th", "st", "nd", "rd"];
        const mod100 = v % 100;
        return v + (s[(mod100 - 20) % 10] || s[mod100] || s[0]);
      };
      const occurrenceFullLabel = (occ) => ({ first: "First", second: "Second", third: "Third", fourth: "Fourth", last: "Last" }[occ] || "First");

        if (d.recurrence === "one-time") {

            const formatOne = (iso) => {
              // iso format "YYYY-MM-DD"
              const [y, m, day] = iso.split("-").map((x) => parseInt(x, 10));
              return `${monthFullName(m)} ${ordinalNumber(day)}, ${y}`;

          setToast({ msg, type });
          setTimeout(() => setToast(null), 2800);

        const highlight = (id) => {
          setHighlightedIds((h) => ({ ...h, [id]: true }));

        };

        // Flash a table row with #FEF6DB for 1 second after it is created or

        }, [schedulers, searchQuery]);

        const onEdit = (s) => { setEditingScheduler(s); setEditorOpen(true); };
        const onNew = () => { setEditingScheduler(null); setEditorOpen(true); };
        const onDuplicate = (s) => {
          // Open the editor modal with a prepared duplicate: same routes/time slots/holidays,
          // but not default and no DIDs assigned. User confirms by clicking Save.
          const draft = {
            ...s,
            id: null, // treat as new on save
            name: `${s.name} [Copy]`,
            isDefault: false,
            assignedTo: "",
          };
          setEditingScheduler(draft);
          setEditorOpen(true);
        };
        const onDelete = (s) => {
          setDeleteConfirm({
            open: true,
            title: "Delete Scheduler",
            itemName: s.name,
            onConfirm: () => {
              setSchedulers((ss) => {
                const remaining = ss.filter((x) => x.id !== s.id);
                // If we just removed the only default scheduler, promote the first remaining
                // scheduler so the list always has exactly one default.
                if (s.isDefault && remaining.length && !remaining.some((x) => x.isDefault)) {
                  return remaining.map((x, i) => (i === 0 ? { ...x, isDefault: true } : x));
                }
                return remaining;
              });
              // Unassign any DIDs that were pointing to this scheduler.
              setDids((ds) => ds.map((d) => (d.schedulerId === s.id ? { ...d, schedulerId: null } : d)));

              setAwayRules((rs) => rs.map((r) => ({
                ...r,
                schedulerIds: (r.schedulerIds || []).filter((id) => id !== s.id),

              showToast(`Deleted "${s.name}"`);
              closeDeleteConfirm();
            },
          });
        };
        // Parse a comma-separated DID string into an array of trimmed phone numbers.
        const parseAssignedTo = (s) => (!s ? [] : String(s).split(",").map((x) => x.trim()).filter(Boolean));

        // Keep top-level DIDs state in sync with a scheduler's assignedTo string.
        // Adds any new DIDs (moved away from other schedulers) and clears the
        // schedulerId on DIDs that used to belong to this scheduler but no longer do.
        const syncDIDsForScheduler = (schedulerId, newAssignedTo, prevAssignedTo, defaultRoute) => {
          const newSet = new Set(parseAssignedTo(newAssignedTo));
          const prevSet = new Set(parseAssignedTo(prevAssignedTo));
          const added = [...newSet].filter((n) => !prevSet.has(n));
          const removed = [...prevSet].filter((n) => !newSet.has(n));
          if (!added.length && !removed.length) return;

          setDids((ds) => {
            const byNumber = new Map(ds.map((d) => [d.number, d]));
            added.forEach((num) => {
              const existing = byNumber.get(num) || { number: num, destination: null };
              byNumber.set(num, {
                ...existing,
                schedulerId,
                destination: existing.destination || defaultRoute || null,
              });
            });
            removed.forEach((num) => {
              const existing = byNumber.get(num);
              if (!existing) return;
              byNumber.set(num, { ...existing, schedulerId: null });
            });
            // Preserve relative order for existing items; append any brand-new ones.
            const result = ds.map((d) => byNumber.get(d.number) || d);
            added.forEach((num) => { if (!ds.some((d) => d.number === num)) result.push(byNumber.get(num)); });
            return result;
          });

          // Also strip the just-added DIDs from any other scheduler's assignedTo.
          if (added.length) {
            setSchedulers((ss) => ss.map((s) => {
              if (s.id === schedulerId) return s;
              const list = parseAssignedTo(s.assignedTo);
              const filtered = list.filter((n) => !added.includes(n));
              if (filtered.length === list.length) return s;
              return { ...s, assignedTo: filtered.join(", ") };
            }));
          }

              if (data.isDefault) return { ...s, isDefault: false };

      const highlightMatch = (text, q) => {
        if (!q || !q.trim()) return text;
        const qLower = q.toLowerCase();
        const tLower = text.toLowerCase();
        // 1) Direct substring match highlights the exact substring
        const idx = tLower.indexOf(qLower);
        if (idx !== -1) {
          const before = text.slice(0, idx);
          const match  = text.slice(idx, idx + q.length);
          const after  = text.slice(idx + q.length);
          return (<>{before}<mark className="bg-warning-50 text-ink-900 rounded-sm px-0.5">{match}</mark>{after}</>);
        }
        // 2) Stripped-phone fallback: ignore brackets/spaces/hyphens both in
        //    the query and the text, then map the stripped match back onto the
        //    original span so something like "8051" highlights "805) 123-8" in
        //    "(805) 123-8525".
        const stripRe = /[()\s-]/;
        const qStripped = qLower.replace(/[()\s-]/g, "");
        if (!qStripped) return text;
        const map = [];
        let stripped = "";
        for (let i = 0; i < tLower.length; i++) {
          if (!stripRe.test(tLower[i])) {
            map.push(i);
            stripped += tLower[i];
          }
        }
        const sIdx = stripped.indexOf(qStripped);
        if (sIdx === -1) return text;
        const origStart = map[sIdx];
        const origEnd = map[sIdx + qStripped.length - 1] + 1;
        const before = text.slice(0, origStart);
        const match  = text.slice(origStart, origEnd);
        const after  = text.slice(origEnd);
        return (<>{before}<mark className="bg-warning-50 text-ink-900 rounded-sm px-0.5">{match}</mark>{after}</>);
      };

        const v = n % 100;
        if (v >= 11 && v <= 13) return "th";
        switch (v % 10) { case 1: return "st"; case 2: return "nd"; case 3: return "rd"; default: return "th"; }
      };
      const withOrdinal = (n) => {
        const num = parseInt(n, 10);
        return Number.isFinite(num) ? `${num}${ordinalSuffix(num)}` : String(n);
      };
      // Build a human-readable tooltip string for a holiday definition from the custom-holiday modal.

        return (

            <button
              ref={btnRef}
              type="button"
              onClick={() => setOpen((x) => !x)}
              aria-label="Row actions"
              className={`inline-flex items-center justify-center w-8 h-8 rounded text-ink-700 hover:bg-ink-50 hover:text-primary-500 transition-colors ${open ? "bg-ink-50 text-primary-500" : ""}`}
            >
              <Icon name="more-vert" size={20} />
            </button>
            {open && ReactDOM.createPortal(
              <div
                ref={menuRef}
                className="fixed z-[9999] bg-white border border-ink-100 rounded shadow-dropdown py-1 bvp-animate-in"
                style={{ top: pos.top, left: pos.left, width: 176 }}
              >
                <div
                  onClick={() => { onChangeScheduler(did.number); setOpen(false); }}
                  className="px-3 py-2 text-[14px] text-ink-900 cursor-pointer bvp-row-hover flex items-center gap-3"
                >
                  <Icon name="edit" size={16} className="text-ink-700" />
                  <span>Change Scheduler</span>
                </div>
              </div>,
              document.body
            )}
          </>
        );
      };

      // Lightweight dropdown for the assigned-scheduler header filter.
      const HeaderFilter = ({ label, options, value, onChange }) => {
        const [open, setOpen] = useState(false);
        const [pos, setPos] = useState({ top: 0, left: 0, width: 0 });
        const btnRef = useRef(null);
        const menuRef = useRef(null);
        const update = () => {
          if (!btnRef.current) return;
          const r = btnRef.current.getBoundingClientRect();
          setPos({ top: r.bottom + 4, left: r.left, width: Math.max(r.width, 220) });
        };
        useEffect(() => {
          if (!open) return;
          update();
          const onDoc = (e) => {
            if (btnRef.current && btnRef.current.contains(e.target)) return;
            if (menuRef.current && menuRef.current.contains(e.target)) return;
            setOpen(false);
          };
          const onScroll = () => update();
          document.addEventListener("mousedown", onDoc);
          window.addEventListener("scroll", onScroll, true);
          window.addEventListener("resize", onScroll);
          return () => {
            document.removeEventListener("mousedown", onDoc);
            window.removeEventListener("scroll", onScroll, true);
            window.removeEventListener("resize", onScroll);
          };
        }, [open]);
        return (
          <>
            <button
              ref={btnRef}
              type="button"
              onClick={() => setOpen((x) => !x)}
              className="inline-flex items-center gap-1 text-[12px] font-bold uppercase tracking-[0.06em] text-ink-900 hover:text-primary-500"
            >
              <span>{label}</span>
              <Icon name="arrow-drop-down" size={20} className="text-ink-600" />
            </button>
            {open && ReactDOM.createPortal(
              <div
                ref={menuRef}
                className="fixed z-[9999] bg-white border border-ink-100 rounded shadow-dropdown py-1 bvp-animate-in"
                style={{ top: pos.top, left: pos.left, width: pos.width }}
              >
                {options.map((o) => (
                  <div
                    key={o.value}
                    onClick={() => { onChange(o.value); setOpen(false); }}
                    className={`px-3 py-1.5 text-[14px] leading-5 cursor-pointer bvp-row-hover ${value === o.value ? "text-primary-500 font-semibold bg-primary-25" : "text-ink-900"}`}
                  >
                    {o.label}
                  </div>
                ))}
              </div>,
              document.body
            )}
          </>
        );
      };

      const DIDsTab = ({ dids, schedulers, onChangeScheduler, highlightedRowIds = {} }) => {
        const [search, setSearch] = useState("");
        const [sortBy, setSortBy] = useState({ field: "number", dir: "asc" });
        const [rowsPerPage, setRowsPerPage] = useState(10);
        const [page, setPage] = useState(1);

        const schedulerById = useMemo(() => {
          const m = new Map();
          schedulers.forEach((s) => m.set(s.id, s));
          return m;
        }, [schedulers]);

        const enriched = useMemo(() =>
          dids.map((d) => {
            const s = d.schedulerId ? schedulerById.get(d.schedulerId) : null;
            // Destination reflects the assigned scheduler's default route; fallback to the DID's own destination if unassigned.
            const destination = s && s.defaultRoute ? s.defaultRoute : d.destination;
            return { ...d, schedulerName: s ? s.name : null, destination };
          }),
        [dids, schedulerById]);

        const filtered = useMemo(() => {
          let rows = enriched;
          const q = search.trim().toLowerCase();
          // Strip brackets/spaces/hyphens so "8051" matches "(805) 123-8525"
          const stripPhone = (s) => (s || "").toLowerCase().replace(/[()\s-]/g, "");
          const qStripped = stripPhone(q);
          if (q) {
            rows = rows.filter((r) => {
              return (
                r.number.toLowerCase().includes(q) ||
                stripPhone(r.number).includes(qStripped) ||
                (r.schedulerName || "").toLowerCase().includes(q)
              );
            });
          }
          const cmp = (a, b, key) => {
            const av = (key === "scheduler" ? (a.schedulerName || "") : a[key] || "").toString();
            const bv = (key === "scheduler" ? (b.schedulerName || "") : b[key] || "").toString();
            return av.localeCompare(bv);
          };
          rows = [...rows].sort((a, b) => {
            const k = sortBy.field;
            const c = cmp(a, b, k);
            return sortBy.dir === "asc" ? c : -c;
          });
          return rows;
        }, [enriched, search, sortBy]);

        const total = filtered.length;
        const totalPages = Math.max(1, Math.ceil(total / rowsPerPage));
        const safePage = Math.min(page, totalPages);
        const startIdx = (safePage - 1) * rowsPerPage;
        const endIdx = Math.min(startIdx + rowsPerPage, total);
        const pageRows = filtered.slice(startIdx, endIdx);
        const isEmpty = dids.length === 0; // empty state only when no DIDs at all

        const toggleSort = (field) => {
          setSortBy((s) => s.field === field
            ? { field, dir: s.dir === "asc" ? "desc" : "asc" }
            : { field, dir: "asc" });
        };

        const SortHeader = ({ field, label }) => {
          const active = sortBy.field === field;
          return (
            <button
              onClick={() => toggleSort(field)}
              className="flex items-center gap-1 text-[12px] font-bold uppercase tracking-[0.06em] text-ink-900 hover:text-primary-500"
            >
              <span>{label}</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" className={active ? "text-primary-500" : "text-[#7F888F]"}>
                {active && sortBy.dir === "desc"
                  ? <path d="M7 10L12 15L17 10H7Z"/>
                  : <path d="M7 14L12 9L17 14H7Z"/>}
              </svg>
            </button>
          );
        };

        const unassignedNumbers = (dids || []).filter((d) => !d.schedulerId).map((d) => d.number);

        return (
          <div className="pt-6">
            {/* Warning — same yellow banner as the Schedulers tab */}
            {unassignedNumbers.length > 0 && (
              <div className="mb-6 bg-warning-50 rounded-lg flex items-center gap-2 px-5 py-1.5">
                <Icon name="warning" size={24} className="text-warning-500 shrink-0" />
                <p className="text-[12px] leading-[18px] tracking-[0.1px] text-ink-900">
                  <span>{unassignedNumbers.length === 1 ? "The following number is not assigned to a scheduler: " : "The following numbers are not assigned to a scheduler: "}</span>
                  <span className="font-semibold">{unassignedNumbers.join(", ")}</span>
                  <br />
                  <span>{unassignedNumbers.length === 1 ? "Please select a scheduler and assign the number. Until then, the number will route to the default scheduler." : "Please select a scheduler and assign the numbers. Until then, the numbers will route to the default scheduler."}</span>
                </p>
              </div>
            )}

            {/* Count + search */}
            <div className="flex items-center gap-5">
              <div className="text-[16px] font-semibold leading-6 text-ink-900 whitespace-nowrap">{dids.length} DIDs available</div>
              <div className="flex-1 relative">
                <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-ink-500" />
                <input
                  value={search}
                  onChange={(e) => { setSearch(e.target.value); setPage(1); }}
                  placeholder="Search"
                  style={{ height: 36 }}
                className="w-full block box-border leading-5 pl-9 pr-3 border border-ink-200 rounded text-[14px] bg-white focus:border-primary-500 focus:outline-none placeholder:text-ink-400"
                />
              </div>
            </div>

            {isEmpty ? (
              <div className="mt-8 py-24 flex flex-col items-center gap-5">
                <div className="w-[72px] h-[72px] rounded-full bg-ink-50 flex items-center justify-center">
                  <Icon name="did" size={34} className="text-ink-700" />
                </div>
                <div className="text-center text-[14px] text-ink-700">There are no DIDs at this location</div>
              </div>
            ) : (
              <div className="mt-6">
                {/* Table */}
                <div className="border border-ink-100 rounded-lg overflow-hidden">
                  <div className="grid grid-cols-[repeat(3,minmax(0,1fr))_90px] h-10 bg-ink-50 border-b border-ink-100 items-center">
                    <div className="pl-7 pr-3">
                      <SortHeader field="number" label="DID NUMBER" />
                    </div>
                    <div className="px-3">
                      <SortHeader field="scheduler" label="ASSIGNED SCHEDULER" />
                    </div>
                    <div className="px-3">
                      <div className="text-[12px] font-bold uppercase tracking-[0.06em] text-ink-900">DEFAULT DESTINATION</div>
                    </div>
                    <div className="flex justify-center">
                      <div className="text-[12px] font-bold uppercase tracking-[0.06em] text-ink-900">ACTIONS</div>
                    </div>
                  </div>
                  {pageRows.length === 0 ? (
                    <div className="py-12 text-center text-[14px] text-ink-500">No DIDs match your filters</div>
                  ) : (
                    pageRows.map((d, i) => (
                      <div
                        key={d.number}
                        className={`grid grid-cols-[repeat(3,minmax(0,1fr))_90px] h-[52px] items-center ${i < pageRows.length - 1 ? "border-b border-ink-100" : ""} ${highlightedRowIds[d.number] ? "bg-[#FEF6DB]" : "hover:bg-ink-50/50"} transition-colors`}
                      >
                        <div className="pl-7 pr-3 text-[14px] text-ink-900 min-w-0">
                          <TruncationTooltip text={d.number} display={highlightMatch(d.number, search)} className="w-full" />
                        </div>
                        <div className="px-3 text-[14px] text-ink-700 min-w-0">
                          {d.schedulerName
                            ? <TruncationTooltip text={d.schedulerName} display={highlightMatch(d.schedulerName, search)} className="w-full" />
                            : <span className="text-ink-400">N/A</span>}
                        </div>
                        <div className="px-3 text-[14px] text-ink-700 min-w-0">
                          {d.destination
                            ? <TruncationTooltip text={d.destination} className="w-full" />
                            : <span className="text-ink-400">N/A</span>}
                        </div>
                        <div className="flex justify-center">
                          <DIDRowMenu did={d} onChangeScheduler={onChangeScheduler} />
                        </div>
                      </div>
                    ))
                  )}
                </div>

                {/* Pagination */}
                <div className="mt-4 flex items-center justify-between text-[14px] text-ink-700">
                  <div className="flex items-center gap-2">
                    <span>Rows per page</span>
                    <span className="bvp-page-select-wrap">
                      <span className="bvp-select-sizer">{rowsPerPage}</span>
                      <select
                        value={rowsPerPage}
                        onChange={(e) => { setRowsPerPage(Number(e.target.value)); setPage(1); }}
                        className="bvp-page-select h-8 border border-ink-200 rounded px-2 text-[14px] bg-white focus:border-primary-500 focus:outline-none"
                      >
                        {[5, 10, 25, 50].map((n) => (<option key={n} value={n}>{n}</option>))}
                      </select>
                    </span>
                    <span className="ml-2">{total === 0 ? "0-0 of 0" : `${startIdx + 1}-${endIdx} of ${total}`}</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <span>Jump to page</span>
                    <select
                      value={safePage}
                      onChange={(e) => setPage(Number(e.target.value))}
                      className="bvp-page-select h-8 border border-ink-200 rounded px-2 text-[14px] bg-white focus:border-primary-500 focus:outline-none min-w-[56px]"
                    >
                      {Array.from({ length: totalPages }, (_, i) => i + 1).map((n) => (
                        <option key={n} value={n}>{n}</option>
                      ))}
                    </select>
                    <div className="flex items-center ml-2">
                      <button
                        onClick={() => setPage(1)}
                        disabled={safePage === 1}
                        className="w-8 h-8 flex items-center justify-center rounded text-ink-700 hover:bg-ink-50 disabled:text-ink-300 disabled:hover:bg-transparent"
                        aria-label="First page"
                      >
                        <Icon name="first-page" size={20} />
                      </button>
                      <button
                        onClick={() => setPage((p) => Math.max(1, p - 1))}
                        disabled={safePage === 1}
                        className="w-8 h-8 flex items-center justify-center rounded text-ink-700 hover:bg-ink-50 disabled:text-ink-300 disabled:hover:bg-transparent"
                        aria-label="Previous page"
                      >
                        <Icon name="chevron-left" size={20} />
                      </button>
                      <button
                        onClick={() => setPage((p) => Math.min(totalPages, p + 1))}
                        disabled={safePage === totalPages}
                        className="w-8 h-8 flex items-center justify-center rounded text-ink-700 hover:bg-ink-50 disabled:text-ink-300 disabled:hover:bg-transparent"
                        aria-label="Next page"
                      >
                        <Icon name="chevron-right" size={20} />
                      </button>
                      <button
                        onClick={() => setPage(totalPages)}
                        disabled={safePage === totalPages}
                        className="w-8 h-8 flex items-center justify-center rounded text-ink-700 hover:bg-ink-50 disabled:text-ink-300 disabled:hover:bg-transparent"
                        aria-label="Last page"
                      >
                        <Icon name="last-page" size={20} />
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      /* =====================================================
       *  CHANGE SCHEDULER MODAL (small modal, from DIDs kebab)
       * ===================================================== */

      const ChangeSchedulerModal = ({ open, onClose, didNumber, currentSchedulerId, schedulers, onSave }) => {
        const [selected, setSelected] = useState(currentSchedulerId || "");
        const [confirmOpen, setConfirmOpen] = useState(false);
        useEffect(() => {
          if (open) { setSelected(currentSchedulerId || ""); setConfirmOpen(false); }
        }, [open, currentSchedulerId]);
        if (!open) return null;
        const options = schedulers.map((s) => ({ value: s.id, label: s.name }));
        const canSave = selected && selected !== currentSchedulerId;
        const dirty = !!(selected && selected !== (currentSchedulerId || ""));
        const requestClose = () => {
          if (!dirty) { onClose?.(); return; }
          setConfirmOpen(true);
        };
        return (
          <>
            <Modal
              open={open}
              onClose={requestClose}
              title="Change Scheduler"
              width={307}
              footer={
                <>
                  <Button variant="secondary" size="md" onClick={requestClose}>Cancel</Button>
                  <Button variant="primary" size="md" disabled={!canSave} onClick={() => onSave(selected)}>Save</Button>
                </>
              }
            >
              <div className="pt-4 pb-2 flex flex-col gap-4">
                <div className="text-[14px] text-ink-900">
                  <span className="font-semibold">DID:</span> <span>{didNumber}</span>
                </div>
                <Select
                  label="Assigned Scheduler"
                  value={selected}
                  onChange={setSelected}
                  options={options}
                  placeholder="Select a scheduler"
                />
              </div>
            </Modal>
            <UnsavedChangesDialog
              open={confirmOpen}
              canSave={!!canSave}
              onCancel={() => setConfirmOpen(false)}
              onDiscard={() => { setConfirmOpen(false); onClose?.(); }}
              onSaveExit={() => { setConfirmOpen(false); onSave(selected); }}
            />
          </>
        );
      };

      /* =====================================================
       *  LOCATION HOLIDAYS TAB
       * ===================================================== */

      // Row-level kebab menu: Edit / Delete
      const LocationHolidayRowMenu = ({ holiday, onEdit, onDelete }) => {
        const [open, setOpen] = useState(false);
        const [pos, setPos] = useState({ top: 0, left: 0 });
        const btnRef = useRef(null);

        const toggle = (e) => {
          e.stopPropagation();
          if (!open && btnRef.current) {
            const r = btnRef.current.getBoundingClientRect();
            setPos({ top: r.bottom + 4, left: r.right - 188 });
          }
          setOpen((o) => !o);
        };

        useEffect(() => {
          if (!open) return;
          const onDoc = () => setOpen(false);
          const onKey = (e) => e.key === "Escape" && setOpen(false);
          document.addEventListener("click", onDoc);
          document.addEventListener("keydown", onKey);
          return () => { document.removeEventListener("click", onDoc); document.removeEventListener("keydown", onKey); };
        }, [open]);

        const menu = open ? ReactDOM.createPortal(
          <div
            style={{ position: "fixed", top: pos.top, left: pos.left }}
            onClick={(e) => e.stopPropagation()}
            className="z-[100] w-[188px] bg-white rounded-md shadow-dropdown border border-ink-100 py-1 bvp-animate-in"
          >
            <button
              onClick={() => { setOpen(false); onEdit(holiday); }}
              className="w-full px-3 h-9 flex items-center gap-3 text-[14px] text-ink-900 hover:bg-ink-50"
            >
              <Icon name="edit" size={16} className="text-ink-700" />
              <span>Edit</span>
            </button>
            <button
              onClick={() => { setOpen(false); onDelete(holiday.id); }}
              className="w-full px-3 h-9 flex items-center gap-3 text-[14px] text-ink-900 hover:bg-ink-50"
            >
              <Icon name="trash" size={16} className="text-ink-700" />
              <span>Delete</span>
            </button>
          </div>,
          document.body
        ) : null;

        return (
          <>
            <button
              ref={btnRef}
              onClick={toggle}
              className={`w-8 h-8 inline-flex items-center justify-center rounded ${open ? "bg-ink-100" : "hover:bg-ink-50"} text-ink-700`}
              aria-label="Row actions"
            >
              <Icon name="more-vert" size={20} />
            </button>
            {menu}
          </>
        );
      };

      const LocationHolidaysTab = ({ locationHolidays, schedulers, onNew, onEdit, onDelete, highlightedRowIds = {} }) => {
        const [search, setSearch] = useState("");
        // Default order: unsorted (reflects insertion order — last added at top)
        const [sortBy, setSortBy] = useState({ field: null, dir: "asc" });
        const [rowsPerPage, setRowsPerPage] = useState(10);
        const [page, setPage] = useState(1);

        // Build reverse map: holidayId -> [scheduler names]
        const assignedBy = useMemo(() => {
          const m = new Map();
          schedulers.forEach((s) => {
            (s.locationHolidays || []).forEach((id) => {
              const arr = m.get(id) || [];
              arr.push(s.name);
              m.set(id, arr);
            });
          });
          return m;
        }, [schedulers]);

        const enriched = useMemo(() => locationHolidays.map((h) => ({
          ...h,
          assignedSchedulers: assignedBy.get(h.id) || [],
        })), [locationHolidays, assignedBy]);

        const filtered = useMemo(() => {
          let rows = enriched;
          const q = search.trim().toLowerCase();
          if (q) {
            rows = rows.filter((r) => (
              r.name.toLowerCase().includes(q) ||
              (r.assignedSchedulers || []).some((n) => n.toLowerCase().includes(q))
            ));
          }
          if (sortBy.field) {
            rows = [...rows].sort((a, b) => {
              const k = sortBy.field;
              const av = (a[k] || "").toString();
              const bv = (b[k] || "").toString();
              const c = av.localeCompare(bv);
              return sortBy.dir === "asc" ? c : -c;
            });
          }
          return rows;
        }, [enriched, search, sortBy]);

        const total = filtered.length;
        const totalPages = Math.max(1, Math.ceil(total / rowsPerPage));
        const safePage = Math.min(page, totalPages);
        const startIdx = (safePage - 1) * rowsPerPage;
        const endIdx = Math.min(startIdx + rowsPerPage, total);
        const pageRows = filtered.slice(startIdx, endIdx);
        const isEmpty = locationHolidays.length === 0;

        const toggleSort = (field) => {
          setSortBy((s) => s.field === field
            ? { field, dir: s.dir === "asc" ? "desc" : "asc" }
            : { field, dir: "asc" });
        };

        const SortHeader = ({ field, label }) => {
          const active = sortBy.field === field;
          return (
            <button
              onClick={() => toggleSort(field)}
              className="flex items-center gap-1 text-[12px] font-bold uppercase tracking-[0.06em] text-ink-900 hover:text-primary-500"
            >
              <span>{label}</span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" className={active ? "text-primary-500" : "text-[#7F888F]"}>
                {active && sortBy.dir === "desc"
                  ? <path d="M7 10L12 15L17 10H7Z"/>
                  : <path d="M7 14L12 9L17 14H7Z"/>}
              </svg>
            </button>
          );
        };

        return (
          <div className="pt-6">
            {/* Warning banner — matches Schedulers tab styling */}
            <div className="mb-6 bg-warning-50 rounded-lg flex items-center gap-2 px-5 py-1.5">
              <Icon name="warning" size={24} className="text-warning-500 shrink-0" />
              <p className="text-[12px] leading-[18px] tracking-[0.1px] text-ink-900">
                Location holidays aren't assigned by default. Add them when configuring your scheduler.
              </p>
            </div>

            {/* Count + search + new holiday button */}
            <div className="flex items-center gap-5">
              <div className="text-[16px] font-semibold leading-6 text-ink-900 whitespace-nowrap">
                {isEmpty
                  ? "0 location holidays available"
                  : `${locationHolidays.length} location holiday${locationHolidays.length === 1 ? "" : "s"}`}
              </div>
              <div className="flex-1 relative">
                <Icon name="search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-ink-500" />
                <input
                  value={search}
                  onChange={(e) => { setSearch(e.target.value); setPage(1); }}
                  placeholder="Search"
                  style={{ height: 36 }}
                className="w-full block box-border leading-5 pl-9 pr-3 border border-ink-200 rounded text-[14px] bg-white focus:border-primary-500 focus:outline-none placeholder:text-ink-400"
                />
              </div>
              <Button variant="primary" size="md" onClick={onNew} iconLeft="plus">
                New Holiday
              </Button>
            </div>

            {isEmpty ? (
              <div className="mt-8 py-20 flex flex-col items-center gap-5">
                <div className="w-[72px] h-[72px] rounded-full bg-ink-50 flex items-center justify-center">
                  <Icon name="holiday" size={38} className="text-ink-700" />
                </div>
                <div className="text-center text-[14px] text-ink-700">There are no holidays at this location yet</div>
              </div>
            ) : (
              <div className="mt-6">
                {/* Table */}
                <div className="border border-ink-100 rounded-lg overflow-hidden">
                  <div className="grid grid-cols-[repeat(6,minmax(0,1fr))_90px] h-10 bg-ink-50 border-b border-ink-100 items-center">
                    <div className="pl-7 pr-3">
                      <SortHeader field="name" label="HOLIDAY NAME" />
                    </div>
                    <div className="px-3 text-[12px] font-bold uppercase tracking-[0.06em] text-ink-900">DATES / DAYS</div>
                    <div className="px-3 text-[12px] font-bold uppercase tracking-[0.06em] text-ink-900">RECURRENCE</div>
                    <div className="px-3 text-[12px] font-bold uppercase tracking-[0.06em] text-ink-900">DURATION</div>
                    <div className="px-3 text-[12px] font-bold uppercase tracking-[0.06em] text-ink-900">DESTINATION</div>
                    <div className="px-3 text-[12px] font-bold uppercase tracking-[0.06em] text-ink-900">ASSIGNED SCHEDULERS</div>
                    <div className="flex justify-center text-[12px] font-bold uppercase tracking-[0.06em] text-ink-900">ACTIONS</div>
                  </div>
                  {pageRows.length === 0 ? (

          setOpen((o) => !o);

            style={{ position: "fixed", top: pos.top, left: pos.left }}

      const AwayModeTab = ({ awayRules, schedulers, onNew, onEdit, onDelete, highlightedRowIds = {} }) => {

            rows = [...rows].sort((a, b) => {
              const k = sortBy.field;

              const c = av.localeCompare(bv);
              return sortBy.dir === "asc" ? c : -c;

        const total = filtered.length;

                  </svg>

                  </div>
                  {pageRows.length === 0 ? (
                    <div className="py-12 text-center text-[14px] text-ink-500">No Away Mode rules match your search</div>
                  ) : (
                    pageRows.map((r, i) => (
                      <div key={r.id}
                        className={`grid grid-cols-[repeat(4,minmax(0,1fr))_90px] h-[52px] items-center ${i < pageRows.length - 1 ? "border-b border-ink-100" : ""} ${highlightedRowIds[r.id] ? "bg-[#FEF6DB]" : "hover:bg-ink-50/50"} transition-colors`}>
                        <div className="pl-4 pr-3 text-[14px] text-ink-900 min-w-0">
                          <TruncationTooltip text={r.name} display={highlightMatch(r.name, search)} className="w-full" />
